<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊助手">
<title>旅遊助手</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--c:#2e7d9f;--ca:#e8f4fd;--cb:#185fa5;--warn:#ba7517;--red:#c0392b;--green:#27ae60;--border:#e8e8e8;--sub:#8a8a8e;--r:13px}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;background:#f2f2f7}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:#1c1c1e;font-size:15px}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:#f2f2f7}
.header{background:var(--c);color:#fff;padding:56px 16px 12px;flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end}
.header h1{font-size:17px;font-weight:600}
.header .sub{font-size:12px;opacity:.75;margin-top:2px}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(80px + env(safe-area-inset-bottom));display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page#page-itinerary{padding:0;overflow:hidden;display:none;flex-direction:column}
.page#page-itinerary.active{display:flex}
.nav{display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-top:.5px solid rgba(0,0,0,.1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;font-size:9px;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:var(--c)}
.nav-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
/* COMMON */
.empty{text-align:center;color:#c0c0c5;padding:36px 0;font-size:13px;line-height:2}
.chip{background:#fff;color:var(--cb);border:.5px solid #b5d4f4;border-radius:20px;padding:6px 13px;font-size:13px}
.badge{display:inline-flex;align-items:center;background:var(--ca);border:.5px solid #b5d4f4;border-radius:20px;padding:5px 12px;font-size:12px;color:var(--cb);margin-bottom:12px}
.sec-label{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.sec-label span{color:var(--c);cursor:pointer}
.add-btn{width:100%;margin-top:8px;padding:13px;border:.5px dashed #c0c0c5;background:none;border-radius:12px;color:var(--sub);font-size:13px;cursor:pointer;font-family:inherit}
/* HOME */
.trip-selector{background:#fff;border-radius:var(--r);padding:13px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ts-name{font-size:15px;font-weight:600;color:var(--cb)}
.ts-date{font-size:12px;color:var(--sub);margin-top:2px}
.trip-card{background:linear-gradient(135deg,var(--c),#3d9ec0);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:12px}
.trip-card h2{font-size:20px;font-weight:700;margin-bottom:3px}
.trip-card .dates{font-size:12px;opacity:.8;margin-bottom:14px}
.trip-stats{display:flex;gap:8px}
.stat{background:rgba(255,255,255,.18);border-radius:10px;padding:10px;flex:1;text-align:center}
.stat .num{font-size:22px;font-weight:700}
.stat .lbl{font-size:10px;opacity:.8;margin-top:1px}
.countdown{background:#fff;border-radius:var(--r);padding:16px;text-align:center;margin-bottom:12px}
.countdown .days{font-size:36px;font-weight:700;color:var(--c);letter-spacing:-1px}
.countdown .lbl{font-size:12px;color:var(--sub);margin-top:3px}
.member-chip{background:#fff;color:var(--cb);border:.5px solid #b5d4f4;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.m-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:#f2f2f7}
.today-card{background:#fff;border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.today-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid #f2f2f7;cursor:pointer}
.today-header .th-label{font-size:13px;font-weight:600}
.today-header .th-go{font-size:12px;color:var(--c)}
.today-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:.5px solid #f9f9f9}
.tr-time{font-size:11px;color:var(--sub);width:36px;flex-shrink:0;text-align:right}
.tr-dot{width:7px;height:7px;border-radius:50%;background:var(--c);flex-shrink:0}
.tr-name{font-size:13px;flex:1;font-weight:500}
.tr-av{width:18px;height:18px;border-radius:50%;background:#e8f4fd;font-size:11px;display:flex;align-items:center;justify-content:center}
/* ITINERARY */
.itin-top{flex-shrink:0;padding:12px 16px 0;background:#f2f2f7}
.noscroll{overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.noscroll::-webkit-scrollbar{display:none}
.day-scroll{display:flex;gap:6px}
.day-btn{padding:7px 12px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:11px;cursor:pointer;white-space:nowrap;color:#555;line-height:1.4;text-align:center;flex-shrink:0;font-family:inherit}
.day-btn.active{background:var(--c);color:#fff;border-color:var(--c)}
.day-info-bar{background:#fff;border-radius:var(--r);padding:11px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.dib-city{font-size:14px;font-weight:600}
.dib-stay{font-size:12px;color:var(--sub);margin-top:2px}
.dib-edit{background:none;border:none;color:var(--c);font-size:13px;cursor:pointer;padding:5px 10px;border:.5px solid var(--c);border-radius:8px;font-family:inherit}
.itin-actions{display:flex;gap:8px;margin-bottom:10px}
.itin-action-btn{flex:1;padding:9px;border:.5px solid var(--border);background:#fff;border-radius:10px;font-size:12px;cursor:pointer;color:#555;text-align:center;font-family:inherit}
.itin-action-btn.danger{color:var(--red);border-color:#ffd5d0}
.itin-scroll-wrap{flex:1;overflow:hidden;position:relative}
.itin-hscroll{overflow-x:auto;overflow-y:auto;height:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:40px}
.itin-hscroll::-webkit-scrollbar{display:none}
.itin-grid{display:flex;flex-direction:row;min-height:100%;align-items:flex-start}
.col-header{background:#fff;border-radius:10px;padding:7px 10px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.col-av{width:24px;height:24px;border-radius:50%;background:#e8f4fd;font-size:14px;display:flex;align-items:center;justify-content:center}
.col-label{font-size:11px;color:var(--sub)}
.itin-card{background:#fff;border-radius:11px;padding:10px 12px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between}
.itin-card h4{font-size:13px;font-weight:600;color:#1c1c1e;padding-right:50px;line-height:1.3}
.card-meta{font-size:10px;color:var(--sub);margin-top:3px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.card-tag{border-radius:5px;padding:1px 6px;font-size:10px;font-weight:500}
.tag-spot{background:#e8f4fd;color:#1a6da3}.tag-food{background:#fff3e0;color:#e65100}
.tag-shop{background:#fce4ec;color:#c2185b}.tag-move{background:#e8f5e9;color:#2e7d32}.tag-stay{background:#ede7f6;color:#512da8}
.card-members{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.card-av{width:20px;height:20px;border-radius:50%;background:#e8f4fd;font-size:11px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
.card-actions{position:absolute;top:6px;right:6px;display:flex;gap:2px}
.card-btn{background:none;border:none;cursor:pointer;padding:4px;color:#c0c0c5;border-radius:6px}
.card-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* EXPLORE - 重新設計 */
.search-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.search-input{flex:1;padding:11px 14px;border:none;border-radius:12px;font-size:15px;background:#fff;color:#1c1c1e;font-family:inherit;outline:none;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.search-input::placeholder{color:#c0c0c5}
.search-btn{padding:11px 16px;background:var(--c);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.search-btn:disabled{opacity:.5}
.src-card{background:#fff;border-radius:var(--r);padding:13px;margin-bottom:9px;display:flex;gap:12px;cursor:pointer}
.src-thumb{width:54px;height:54px;border-radius:10px;background:#f2f2f7;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px}
.src-thumb img{width:100%;height:100%;object-fit:cover}
.src-info{flex:1;min-width:0}
.src-title{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.src-desc{font-size:12px;color:#555;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.src-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.src-domain{font-size:11px;color:var(--sub)}
.src-add-btn{background:var(--c);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:500;font-family:inherit}
.src-link-btn{background:#f2f2f7;color:#555;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.search-loading{text-align:center;padding:32px;color:var(--sub);font-size:13px}
.search-loading::after{content:'';display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--c);border-radius:50%;animation:spin .7s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.search-tip{background:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:14px}
.search-tip p{font-size:13px;color:#555;line-height:1.7}
.search-tip strong{color:var(--cb)}
.search-count{font-size:12px;color:var(--sub);margin-bottom:10px}
/* BUDGET */
.budget-summary{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px}
.budget-summary h3{font-size:13px;color:var(--sub);margin-bottom:4px;font-weight:500}
.budget-total-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.budget-total{font-size:30px;font-weight:700;color:#1c1c1e;letter-spacing:-1px}
.settle-btn{background:var(--c);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:5px}
.settle-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat-filter-row{display:flex;gap:6px;flex-wrap:wrap}
.cat-filter-btn{padding:5px 11px;border-radius:20px;background:#f2f2f7;border:none;font-size:12px;cursor:pointer;color:#555;font-family:inherit;font-weight:500}
.cat-filter-btn.active{color:#fff}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.day-filter-btn{padding:6px 12px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0;font-family:inherit}
.day-filter-btn.active{background:var(--warn);color:#fff;border-color:var(--warn)}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#fff;border-radius:10px;margin-bottom:8px;cursor:pointer}
.exp-left{display:flex;align-items:center;gap:10px}
.exp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.exp-name{font-size:14px;font-weight:500}
.exp-meta{font-size:11px;color:var(--sub);margin-top:1px}
.exp-amt{font-size:15px;font-weight:600}
.exp-payer{font-size:11px;color:var(--sub);margin-top:1px;text-align:right}
.add-exp-btn{width:100%;padding:14px;background:var(--c);color:#fff;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}
/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(50,50,50,.92);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#f2f2f7;border-radius:20px 20px 0 0;padding:20px 16px calc(16px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal::before{content:"";display:block;width:36px;height:4px;background:#c0c0c5;border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;color:#1c1c1e;text-align:center}
.frow{margin-bottom:12px}
.frow label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;padding:11px 13px;border:none;border-radius:10px;font-size:15px;background:#fff;color:#1c1c1e;font-family:inherit;-webkit-appearance:none;outline:none}
.frow textarea{resize:none;height:72px}
.hint-text{font-size:11px;color:var(--sub);margin-top:4px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:14px;border:none;background:#e5e5ea;border-radius:12px;font-size:15px;cursor:pointer;color:#1c1c1e;font-family:inherit;font-weight:500}
.btn-save{flex:1;padding:14px;border:none;background:var(--c);color:#fff;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.btn-save:disabled,.btn-cancel:disabled{opacity:.4}
.btn-danger{padding:14px;border:none;background:#fff0ee;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;width:100%;margin-top:8px;color:var(--red);font-family:inherit}
.full-btn{width:100%;padding:14px;border:none;background:var(--c);color:#fff;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit;margin-bottom:8px}
.member-check-row{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.member-check{display:flex;align-items:center;gap:7px;background:#fff;border-radius:20px;padding:7px 13px;cursor:pointer;border:1.5px solid transparent}
.member-check.selected{border-color:var(--c);background:var(--ca)}
.mc-av{width:24px;height:24px;border-radius:50%;background:#f2f2f7;font-size:14px;display:flex;align-items:center;justify-content:center}
.mc-name{font-size:13px;font-weight:500}
.select-all-btn{font-size:12px;color:var(--c);background:none;border:none;cursor:pointer;padding:4px 8px;font-family:inherit;text-decoration:underline}
/* BALLOON */
.balloon-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
.balloon-overlay.open{display:flex}
.balloon{background:#fff;border-radius:20px;padding:20px;box-shadow:0 12px 48px rgba(0,0,0,.18);width:300px;max-width:88vw}
.balloon-name{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center}
.balloon-avatars{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.b-avatar-btn{width:44px;height:44px;border-radius:50%;border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;background:#f2f2f7}
.b-avatar-btn.selected{border-color:var(--c);background:var(--ca)}
.balloon-btns{display:flex;gap:8px}
.balloon-cancel,.balloon-save{flex:1;padding:11px;border:none;border-radius:11px;font-size:14px;cursor:pointer;font-family:inherit}
.balloon-cancel{background:#e5e5ea;color:#1c1c1e;font-weight:500}
.balloon-save{background:var(--c);color:#fff;font-weight:600}
/* SETTLE / SPLIT */
.settle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:.5px solid #f2f2f7}
.settle-row:last-child{border-bottom:none}
.settle-name{font-size:15px;font-weight:600}
.settle-detail{font-size:12px;color:var(--sub);margin-top:2px}
.settle-amount{font-size:15px;font-weight:700}
.settle-amount.owe{color:var(--red)}.settle-amount.receive{color:var(--green)}.settle-amount.even{color:var(--sub)}
.debt-row{padding:8px 0;border-bottom:.5px solid #f9f9f9;font-size:13px;display:flex;justify-content:space-between}
.split-member-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #f2f2f7}
.split-member-row:last-child{border-bottom:none}
.split-name{font-size:14px;font-weight:500}
.split-input{width:110px;padding:7px 10px;border:none;border-radius:8px;font-size:14px;background:#f2f2f7;color:#1c1c1e;font-family:inherit;text-align:right;outline:none}
.split-total-note{font-size:12px;color:var(--sub);text-align:right;margin-top:6px}
.split-total-note.error{color:var(--red)}
.day-picker-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.day-picker-row::-webkit-scrollbar{display:none}
.day-pick-btn{padding:7px 13px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0;font-family:inherit}
.day-pick-btn.active{background:var(--c);color:#fff;border-color:var(--c)}
.screen{position:fixed;inset:0;background:#f2f2f7;z-index:400;display:none;flex-direction:column;max-width:430px;margin:0 auto}
.screen.open{display:flex}
.screen-header{background:var(--c);color:#fff;padding:56px 16px 12px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0}
.screen-header h2{font-size:17px;font-weight:600}
.screen-close{background:none;border:none;color:rgba(255,255,255,.85);font-size:15px;cursor:pointer;padding:4px 0 4px 16px;font-family:inherit}
.screen-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.screen-footer{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:#fff;border-top:.5px solid var(--border)}
.trip-item{background:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.trip-item.active-trip{background:#e8f4fd}
.ti-name{font-size:15px;font-weight:600}
.ti-meta{font-size:12px;color:var(--sub);margin-top:3px}
.ti-badge{background:var(--c);color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:500}
.icon-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:5px}
/* AUTH */
.login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a5f7a,#2e7d9f,#3d9ec0);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;max-width:430px;margin:0 auto}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:6px}
.login-sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:40px;text-align:center;line-height:1.6}
.login-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card h3{font-size:16px;font-weight:700;color:#1c1c1e;margin-bottom:16px;text-align:center}
.login-or{text-align:center;font-size:12px;color:var(--sub);margin:12px 0;display:flex;align-items:center;gap:8px}
.login-or::before,.login-or::after{content:'';flex:1;height:.5px;background:#e0e0e0}
.google-btn{width:100%;padding:13px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;color:#1c1c1e;margin-bottom:10px}
.email-btn{width:100%;padding:13px;background:var(--c);border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;font-family:inherit}
.auth-input{width:100%;padding:11px 13px;border:.5px solid #e0e0e0;border-radius:10px;font-size:15px;background:#f9f9f9;color:#1c1c1e;font-family:inherit;outline:none;margin-bottom:8px}
.auth-input:focus{border-color:var(--c);background:#fff}
.auth-err{font-size:12px;color:var(--red);text-align:center;min-height:16px;margin-bottom:8px}
.auth-switch{font-size:12px;color:var(--c);text-align:center;cursor:pointer;margin-top:10px}
.user-chip{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 8px 3px 3px;border-radius:20px;background:rgba(255,255,255,.15)}
.user-av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden}
.user-av img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:12px;color:#fff;font-weight:500;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.invite-box{background:var(--ca);border:.5px solid #b5d4f4;border-radius:12px;padding:14px;margin-top:12px}
.invite-url{font-size:11px;color:var(--cb);word-break:break-all;margin-bottom:8px;line-height:1.5}
.copy-btn{padding:7px 14px;background:var(--c);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;font-family:inherit}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
  <div class="login-logo">✈️</div>
  <div class="login-title">旅遊助手</div>
  <div class="login-sub">給家人的旅行規劃工具<br>請登入以存取你的旅行</div>
  <div class="login-card">
    <h3 id="auth-title">登入</h3>
    <button class="google-btn" onclick="signInGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 帳號登入
    </button>
    <div class="login-or">或</div>
    <input class="auth-input" id="auth-email" type="email" placeholder="電子郵件" autocomplete="email">
    <input class="auth-input" id="auth-pw" type="password" placeholder="密碼（至少6位）" autocomplete="current-password">
    <div class="auth-err" id="auth-err"></div>
    <button class="email-btn" id="auth-submit-btn" onclick="signInEmail()">登入</button>
    <div class="auth-switch" id="auth-switch" onclick="toggleAuthMode()">還沒有帳號？點此註冊</div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="header">
    <div><h1>旅遊助手</h1><div class="sub" id="header-sub">載入中…</div></div>
    <div class="user-chip" onclick="openUserMenu()">
      <div class="user-av" id="user-av">?</div>
      <span class="user-name" id="user-name-chip"></span>
    </div>
  </div>
  <div class="pages">
    <div class="page active" id="page-home">
      <div class="trip-selector" onclick="openTripList()">
        <div><div class="ts-name" id="ts-name">選擇行程</div><div class="ts-date" id="ts-date">點此切換旅行</div></div>
        <div style="color:var(--sub)"><svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div id="home-content"><div class="empty">尚未選擇行程</div></div>
    </div>
    <div class="page" id="page-itinerary">
      <div class="itin-top">
        <div class="noscroll day-scroll" id="day-tabs"></div>
        <div id="day-info-bar"></div>
        <div class="itin-actions">
          <button class="itin-action-btn" onclick="openAddDay()">＋ 新增一天</button>
          <button class="itin-action-btn" onclick="openSpotModal()">＋ 新增景點</button>
          <button class="itin-action-btn danger" onclick="deleteCurrentDay()">刪除此天</button>
        </div>
      </div>
      <div class="itin-scroll-wrap">
        <div class="itin-hscroll" id="itin-hscroll"><div class="itin-grid" id="itin-grid"></div></div>
      </div>
    </div>
    <div class="page" id="page-explore">
      <div class="search-tip">
        <p>輸入目的地 + 關鍵字搜尋，例如：<br><strong>京都 美食</strong>、<strong>基隆 景點</strong>、<strong>羅馬 咖啡</strong></p>
      </div>
      <div class="search-bar">
        <input class="search-input" id="search-input" placeholder="輸入關鍵字…" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-btn" id="search-btn" onclick="doSearch()">搜尋</button>
      </div>
      <div id="search-results"></div>
    </div>
    <div class="page" id="page-budget">
      <div class="budget-summary">
        <h3>總消費</h3>
        <div class="budget-total-row">
          <div class="budget-total" id="budget-total">—</div>
          <button class="settle-btn" onclick="openSettle()"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>結算</button>
        </div>
        <div class="cat-filter-row" id="cat-filter-row"></div>
      </div>
      <div class="badge" id="currency-badge" style="display:none"></div>
      <div class="filter-scroll" id="budget-filter"></div>
      <div id="exp-list"></div>
      <button class="add-exp-btn" onclick="openExpModal(null)">＋ 新增消費</button>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('home',this)"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>首頁</button>
    <button class="nav-btn" onclick="showPage('itinerary',this)"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>行程</button>
    <button class="nav-btn" onclick="showPage('explore',this)"><div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>探索</button>
    <button class="nav-btn" onclick="showPage('budget',this)"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>記帳</button>
  </nav>
</div>

<!-- 使用者選單 -->
<div class="overlay" id="user-menu-modal">
  <div class="modal">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:20px">
      <div id="um-avatar" style="width:56px;height:56px;border-radius:50%;background:#e8f4fd;font-size:30px;display:flex;align-items:center;justify-content:center;overflow:hidden"></div>
      <div style="font-size:16px;font-weight:700" id="um-name"></div>
      <div style="font-size:12px;color:var(--sub)" id="um-email"></div>
    </div>
    <div class="frow" style="margin-bottom:0">
      <label>邀請對方加入旅行</label>
      <div style="font-size:12px;color:var(--sub);margin-bottom:8px">分享連結，對方點擊後即可加入目前行程</div>
      <button class="full-btn" style="margin-bottom:0" onclick="genInvite()">產生邀請連結</button>
      <div id="invite-result" style="display:none" class="invite-box">
        <div class="invite-url" id="invite-url"></div>
        <button class="copy-btn" onclick="copyInvite()">複製連結</button>
      </div>
    </div>
    <button class="btn-danger" onclick="doSignOut()" style="margin-top:16px">登出</button>
    <div class="modal-btns" style="margin-top:8px"><button class="btn-cancel" id="user-menu-cancel">關閉</button></div>
  </div>
</div>

<div class="screen" id="trip-list-screen">
  <div class="screen-header"><h2>我的旅行</h2><button class="screen-close" onclick="closeTripList()">關閉</button></div>
  <div class="screen-body" id="trip-list-body"></div>
  <div class="screen-footer"><button class="full-btn" onclick="openNewTripModal()">＋ 新增旅行</button></div>
</div>

<div class="balloon-overlay" id="balloon-overlay" onclick="closeBalloon()">
  <div class="balloon" onclick="event.stopPropagation()">
    <div class="balloon-name" id="balloon-name"></div>
    <div class="balloon-avatars" id="balloon-avatars"></div>
    <div class="balloon-btns">
      <button class="balloon-cancel" onclick="closeBalloon()">取消</button>
      <button class="balloon-save" onclick="saveMemberAvatar()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="trip-modal">
  <div class="modal"><h3 id="trip-modal-title">新增旅行</h3>
    <div class="frow"><label>旅行名稱</label><input id="tm-name" placeholder="例：日本關西之旅"></div>
    <div class="frow"><label>副標題</label><input id="tm-sub" placeholder="例：東京・橫濱・箱根"></div>
    <div class="frow"><label>出發日期</label><input id="tm-start" type="date"></div>
    <div class="frow"><label>回程日期</label><input id="tm-end" type="date"></div>
    <div class="frow"><label>成員</label><input id="tm-members" placeholder="例：Dan, Co, 魚, 月"><div class="hint-text">逗號分隔，支援「，」</div></div>
    <div class="frow"><label>城市</label><input id="tm-cities" placeholder="例：東京, 橫濱, 箱根"><div class="hint-text">逗號分隔，按天數順序</div></div>
    <div class="frow"><label>記帳貨幣</label>
      <select id="tm-currency"><option>¥ 日圓</option><option>$ 美元</option><option>€ 歐元</option><option>NT$ 台幣</option><option>HK$ 港幣</option><option>₩ 韓元</option><option>฿ 泰銖</option></select>
    </div>
    <div class="modal-btns"><button class="btn-cancel" id="trip-cancel-btn">取消</button><button class="btn-save" id="trip-save-btn" onclick="saveTrip()">儲存</button></div>
  </div>
</div>

<div class="overlay" id="edit-day-modal">
  <div class="modal"><h3>編輯當日資訊</h3>
    <div class="frow"><label>城市／地點</label><select id="ed-city"></select></div>
    <div class="frow"><label>住宿地點</label><input id="ed-stay" placeholder="例：大船站附近"></div>
    <div class="modal-btns"><button class="btn-cancel" id="edit-day-cancel-btn">取消</button><button class="btn-save" id="edit-day-save-btn" onclick="saveEditDay()">儲存</button></div>
  </div>
</div>

<div class="overlay" id="add-day-modal">
  <div class="modal"><h3>新增一天</h3>
    <div class="frow"><label>城市／地點</label><select id="ad-city"></select></div>
    <div class="frow"><label>住宿地點</label><input id="ad-stay" placeholder="例：大阪站附近"></div>
    <div class="modal-btns"><button class="btn-cancel" id="addday-cancel-btn">取消</button><button class="btn-save" id="addday-save-btn" onclick="saveNewDay()">新增</button></div>
  </div>
</div>

<div class="overlay" id="spot-modal">
  <div class="modal"><h3 id="spot-modal-title">新增景點</h3>
    <div class="frow"><label>名稱</label><input id="s-name" placeholder="例：鶴岡八幡宮"></div>
    <div class="frow"><label>時間</label><input id="s-time" type="time" value="10:00"></div>
    <div class="frow"><label>類型</label><select id="s-type"><option>景點</option><option>餐廳</option><option>購物</option><option>交通</option><option>住宿</option></select></div>
    <div class="frow"><label>備註</label><textarea id="s-note" placeholder="選填"></textarea></div>
    <div class="frow"><label>到下一站交通</label><input id="s-trans" placeholder="選填"></div>
    <div class="frow">
      <label style="display:flex;justify-content:space-between;align-items:center">參與成員<button class="select-all-btn" onclick="toggleSelectAll()">全選／取消</button></label>
      <div class="member-check-row" id="member-checks"></div>
    </div>
    <div class="modal-btns"><button class="btn-cancel" id="spot-cancel-btn">取消</button><button class="btn-save" id="spot-save-btn" onclick="saveSpot()">儲存</button></div>
  </div>
</div>

<div class="overlay" id="exp-modal">
  <div class="modal"><h3 id="exp-modal-title">新增消費</h3>
    <div class="frow"><label>項目</label><input id="e-name" placeholder="例：午餐"></div>
    <div class="frow"><label>總金額</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="e-amt" type="number" placeholder="0" oninput="updateSplitFromTotal()" style="flex:1;padding:11px 13px;border:none;border-radius:10px;font-size:15px;background:#fff;color:#1c1c1e;font-family:inherit;outline:none">
        <span style="font-size:13px;color:var(--sub);white-space:nowrap" id="e-currency-label">¥</span>
      </div>
    </div>
    <div class="frow"><label>類別</label><select id="e-cat"><option>餐飲</option><option>交通</option><option>景點門票</option><option>購物</option><option>住宿</option><option>其他</option></select></div>
    <div class="frow"><label>日期</label><select id="e-day"></select></div>
    <div style="height:.5px;background:#e0e0e0;margin:8px 0"></div>
    <div class="frow"><label>付款明細</label><div id="split-rows"></div><div class="split-total-note" id="split-note"></div></div>
    <div class="modal-btns"><button class="btn-cancel" id="exp-cancel-btn">取消</button><button class="btn-save" id="exp-save-btn" onclick="saveExp()">儲存</button></div>
    <button class="btn-danger" id="exp-delete-btn" style="display:none" onclick="deleteExpFromModal()">刪除這筆消費</button>
  </div>
</div>

<div class="overlay" id="add-itin-modal">
  <div class="modal"><h3>加入行程</h3>
    <div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:14px">
      <div style="font-weight:600;font-size:14px" id="aim-name"></div>
      <div style="font-size:12px;color:var(--sub);margin-top:3px" id="aim-url"></div>
    </div>
    <div class="frow"><label>加入哪一天</label><div class="day-picker-row" id="aim-day-picker"></div></div>
    <div class="frow"><label>時間</label><input id="aim-time" type="time" value="10:00"></div>
    <div class="frow"><label>類型</label><select id="aim-type"><option>景點</option><option>餐廳</option><option>購物</option><option>交通</option><option>住宿</option></select></div>
    <div class="frow"><label>備註（選填）</label><input id="aim-note" placeholder="選填"></div>
    <div class="modal-btns"><button class="btn-cancel" id="aim-cancel-btn">取消</button><button class="btn-save" id="aim-save-btn" onclick="saveAddToItin()">加入行程</button></div>
  </div>
</div>

<div class="overlay" id="settle-modal">
  <div class="modal"><h3>結算</h3>
    <div id="settle-content"></div>
    <div class="modal-btns" style="margin-top:16px"><button class="btn-cancel" id="settle-cancel-btn">關閉</button></div>
  </div>
</div>

<script type="module">

import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp,getDoc,getDocs,setDoc,enableIndexedDbPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fb=initializeApp({apiKey:"AIzaSyDnY5wcb0QXOPXzAvRmrqltESS_U5afCS8",authDomain:"travel-app-38ad8.firebaseapp.com",projectId:"travel-app-38ad8",storageBucket:"travel-app-38ad8.firebasestorage.app",messagingSenderId:"306708070000",appId:"1:306708070000:web:716f2db183d2e432357eb5"});
const db=getFirestore(fb),auth=getAuth(fb),gProvider=new GoogleAuthProvider();

// ── 常數 ──
const TAG={景點:'tag-spot',餐廳:'tag-food',購物:'tag-shop',交通:'tag-move',住宿:'tag-stay'};
const CAT_BG={餐飲:'#fff3e0',交通:'#e8f5e9',景點門票:'#e8f4fd',購物:'#fce4ec',住宿:'#ede7f6',其他:'#f5f5f5'};
const CAT_FG={餐飲:'#e65100',交通:'#2e7d32',景點門票:'#1565c0',購物:'#880e4f',住宿:'#4527a0',其他:'#555'};

  購物:`<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>`,

};
const AVATARS=['🧑','👩','🧒','👦','👧','🌙','🐟','🐱','🐶','🐻','🦊','🐼','🐨','🐯','🦁','🐸','🐙','⭐','🌸','🍀'];

const ESV=`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

let trips=[],curTripId=null,curDay=0,curBudgetDay='all',curCatFilter=null;

let editSpotId=null,editExpId=null,editTripId=null,aimPlace=null,aimDayIdx=0;

const $=(id)=>document.getElementById(id);

const getSymbol=()=>(getCurTrip()?.currency||'¥').split(' ')[0];

async function handleInvite(token){
  try{
    const snap=await getDoc(doc(db,'invites',token));if(!snap.exists()){toast('邀請連結已失效');return;}
    const{tripId}=snap.data();const tripSnap=await getDoc(doc(db,'trips',tripId));

    const data=tripSnap.data(),memberIds=data.memberIds||[];
    if(!memberIds.includes(curUser.uid)){await updateDoc(doc(db,'trips',tripId),{memberIds:[...memberIds,curUser.uid]});toast('已加入旅行：'+data.name);}

function startTripListener(){
  if(window._tripUnsub)window._tripUnsub();if(!curUser)return;
  const uid=curUser.uid;
  window._tripUnsub=onSnapshot(query(collection(db,'trips'),orderBy('ts')),snap=>{
    trips=[];
    snap.forEach(d=>{const t={...d.data(),id:d.id};if(!t.ownerId||t.ownerId===uid||(t.memberIds||[]).includes(uid))trips.push(t);});
    // 同步當前旅行的頭像（其他成員更新時即時刷新）
    if(curTripId){const ct=trips.find(x=>x.id===curTripId);if(ct)memberAvatars=ct.avatars||{};}
    renderTripList();
    if(!curTripId&&trips.length>0)selectTrip(trips[0].id);else if(curTripId)renderHome();
  });
}

async function autoGenerateDays(tripId,startDate,endDate,cities){
  if(!startDate||!endDate)return;
  const s=new Date(startDate),e=new Date(endDate),total=Math.round((e-s)/86400000)+1;
  if(total<=0||total>60)return;
  const ex=await getDocs(collection(db,'trips',tripId,'days'));
  if(ex.size>0)return;
  for(let i=0;i<total;i++){
    const d=new Date(s);d.setDate(s.getDate()+i);
    await addDoc(collection(db,'trips',tripId,'days'),{city:cities[i]||cities[cities.length-1]||'',stay:'',order:i,date:`${d.getMonth()+1}/${d.getDate()}`,ts:serverTimestamp()});
  }
}

  const s=t.startDate?new Date(t.startDate):null,e=t.endDate?new Date(t.endDate):null;
  const diffDays=s&&e?Math.round((e-s)/86400000)+1:0;
  const today=new Date();today.setHours(0,0,0,0);
  const dl=s?Math.round((s-today)/86400000):null;
  let todayIdx=-1;if(dl!==null&&dl<=0)todayIdx=Math.min(Math.abs(dl),days.length-1);
  const cdText=dl===null?'—':dl>0?dl:dl===0?'今天出發':'旅行中';
  const cdLabel=dl>0?'距出發天數':dl<0?'旅行中':'';
  const members=getMembers(),cities=getCities();
  let todayHTML='';
  if(todayIdx>=0&&days.length>0){
    const d=days[todayIdx],ts=spots.filter(s=>s.day===todayIdx).sort((a,b)=>a.t.localeCompare(b.t));
    todayHTML=`<div class="today-card"><div class="today-header" onclick="goToItinerary(${todayIdx})"><span class="th-label">第${todayIdx+1}天${d?.city?' · '+d.city:''}</span><span class="th-go">完整行程 →</span></div>

      :'<div style="padding:14px 16px;font-size:13px;color:#c0c0c5;text-align:center">今天尚無行程</div>'}
    </div>`;
  }
  $('home-content').innerHTML=`
    <div class="trip-card"><h2>${t.name}</h2><div class="dates">${t.startDate||''}${t.endDate?' ─ '+t.endDate:''}</div>
      <div class="trip-stats">${[['天數',diffDays||'?'],['成員',members.length||'?'],['城市',cities.length||'?']].map(([l,n])=>`<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join('')}</div>
    </div>
    <div class="countdown"><div class="days">${cdText}</div><div class="lbl">${cdLabel}</div></div>
    ${todayHTML}
    ${members.length?`<div class="sec-label">旅遊成員 <span  onclick="openEditTrip('${t.id}')">編輯</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${members.map((m,i)=>`<div class="member-chip" style="background:${MC[i%MC.length]}" onclick="openBalloon(event,'${m}')"><div class="m-avatar">${av(m)}</div>${m}</div>`).join('')}</div>`:''}

window.saveTrip=function(){
  withLock($('trip-save-btn'),async()=>{
    const name=val('tm-name').trim();if(!name)return;
    const cities=parseList(val('tm-cities')),members=parseList(val('tm-members'));
    const startDate=val('tm-start'),endDate=val('tm-end');

// ── 行程多欄渲染 ──
function assignCols(spots){
  const cols=[],sCol=new Map();
  spots.forEach(s=>{
    const ms=new Set(s.members||[]);
    if(!ms.size){if(!cols.length)cols.push(new Set());sCol.set(s.id,0);return;}
    let best=-1,bestOv=-1;
    cols.forEach((cm,ci)=>{
      const ov=[...ms].filter(m=>cm.has(m)).length;
      if(![...ms].some(m=>cols.some((c,i)=>i!==ci&&c.has(m)))&&ov>bestOv){bestOv=ov;best=ci;}
    });
    if(best>=0){[...ms].forEach(m=>cols[best].add(m));sCol.set(s.id,best);}
    else{cols.push(new Set(ms));sCol.set(s.id,cols.length-1);}
  });
  return{cols,sCol};
}

function renderItinerary(){
  renderDayInfoBar();
  const grid=$('itin-grid');
  if(!days.length){grid.innerHTML='<div style="padding:24px;color:#c0c0c5;font-size:13px;text-align:center">尚未建立行程天數<br>點「新增一天」開始</div>';return;}
  const ds=spots.filter(s=>s.day===curDay).sort((a,b)=>a.t.localeCompare(b.t));
  if(!ds.length){grid.innerHTML='<div style="padding:24px;color:#c0c0c5;font-size:13px;text-align:center">今天還沒有行程<br>點上方「新增景點」</div>';return;}
  const{cols,sCol}=assignCols(ds);
  const nc=Math.max(cols.length,1);
  const times=[...new Set(ds.map(s=>s.t))].sort();
  const hdrs=Array.from({length:nc},(_,ci)=>`<div style="flex:1;min-width:0;margin-right:${ci<nc-1?'6px':'0'}">
    <div class="col-header">${cols[ci]?[...cols[ci]].map(m=>`<div class="col-av">${av(m)}</div>`).join(''):'<span class="col-label">行程</span>'}</div></div>`).join('');
  const rows=times.map(t=>`<div style="display:flex;margin-bottom:6px">
    ${Array.from({length:nc},(_,ci)=>{
      const at=ds.filter(s=>s.t===t&&sCol.get(s.id)===ci);
      if(at.length)return at.map(s=>`<div class="itin-card" style="flex:1;min-width:0;margin-right:${ci<nc-1?'6px':'0'};margin-bottom:0">
        ${cA(s.id)}
        <div style="display:flex;align-items:flex-start;gap:8px">
          <div style="background:#e8f4fd;border-radius:8px;padding:4px 7px;flex-shrink:0">
            <span style="font-size:11px;font-weight:700;color:#185fa5;white-space:nowrap">${s.t}</span>
          </div>
          <div style="flex:1;min-width:0">
            <h4 style="overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;padding-right:44px">${s.n}</h4>
            <div class="card-meta"><span class="card-tag ${TAG[s.type]||'tag-spot'}">${s.type}</span>${s.note?`<span style="overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical">${s.note}</span>`:''}</div>
            <div class="card-members">${mAVs(s.members)}</div>
            ${s.trans?`<div style="display:flex;align-items:center;gap:4px;padding-top:5px;margin-top:4px;border-top:.5px solid var(--border)"><svg width="11" height="11" viewBox="0 0 24 24" stroke="#185fa5" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><span style="font-size:10px;color:var(--sub);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical">${s.trans}</span></div>`:''}
          </div>
        </div>
        </div>`).join('');
      return`<div style="flex:1;min-width:0;margin-right:${ci<nc-1?'6px':'0'}"></div>`;
    }).join('')}</div>`).join('');
  grid.innerHTML=`<div style="flex:1;min-width:0;padding:8px 16px 60px">
    <div style="display:flex;margin-bottom:4px">${hdrs}</div>${rows}</div>`;
}

// ── 景點 Modal ──
function renderMemberChecks(sel=[]){
  $('member-checks').innerHTML=getMembers().map(m=>`
    <div class="member-check${sel.includes(m)?' selected':''}" onclick="this.classList.toggle('selected')">
      <div class="mc-av">${av(m)}</div><span class="mc-name">${m}</span>
    </div>`).join('');
}
window.toggleSelectAll=function(){
  const checks=document.querySelectorAll('.member-check'),all=[...checks].every(c=>c.classList.contains('selected'));
  checks.forEach(c=>c.classList.toggle('selected',!all));
};
const getSelectedMembers=()=>[...document.querySelectorAll('.member-check.selected')].map(el=>el.querySelector('.mc-name').textContent);

window.openSpotModal=function(){
  editSpotId=null;$('spot-modal-title').textContent='新增景點';
  ['s-name','s-note','s-trans'].forEach(id=>$(id).value='');
  $('s-time').value='10:00';$('s-type').value='景點';renderMemberChecks();openModal('spot-modal');
};
window.openEditSpot=function(id){
  editSpotId=id;const s=spots.find(x=>x.id===id);if(!s)return;
  $('spot-modal-title').textContent='編輯景點';
  $('s-name').value=s.n||'';$('s-time').value=s.t||'10:00';
  $('s-type').value=s.type||'景點';$('s-note').value=s.note||'';$('s-trans').value=s.trans||'';
  renderMemberChecks(s.members||[]);openModal('spot-modal');
};
window.saveSpot=function(){
  withLock($('spot-save-btn'),async()=>{
    const n=val('s-name').trim();if(!n||!curTripId)return;
    const data={n,t:val('s-time'),type:val('s-type'),note:val('s-note'),trans:val('s-trans'),members:getSelectedMembers(),fullRow:false,day:curDay,ts:serverTimestamp()};
    if(editSpotId)await updateDoc(doc(db,'trips',curTripId,'spots',editSpotId),data);
    else await addDoc(collection(db,'trips',curTripId,'spots'),data);
    closeModal('spot-modal');toast(editSpotId?'景點已更新':'景點已儲存');
  });
};
window.delSpot=async function(id){if(!confirm('確定刪除？'))return;await deleteDoc(doc(db,'trips',curTripId,'spots',id));toast('已刪除');};

// ── 探索：關鍵字搜尋 ──
window.doSearch=async function(){
  const q=$('search-input').value.trim();if(!q){toast('請輸入關鍵字');return;}
  const btn=$('search-btn');btn.disabled=true;btn.textContent='搜尋中…';
  $('search-results').innerHTML='<div class="search-loading">搜尋中</div>';
  try{
    const res=await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data=await res.json();
    if(!res.ok||data.error){$('search-results').innerHTML=`<div class="empty">搜尋失敗<br>${data.error||''}</div>`;return;}
    renderSearchResults(data.results,q);
  }catch(e){
    $('search-results').innerHTML='<div class="empty">無法連線<br>請確認網路後再試</div>';
  }finally{btn.disabled=false;btn.textContent='搜尋';}
};

<button class="src-link-btn" onclick="window.open('${r.url}','_blank')">查看</button>
<button class="src-add-btn" onclick="openAddSearchResult(${i})">＋ 加入</button>

window.openAddSearchResult=function(i){
  if(!curTripId){toast('請先選擇行程');return;}if(!days.length){toast('請先新增天數');return;}
  aimPlace=window._searchResults[i];aimDayIdx=curDay<days.length?curDay:0;
  $('aim-name').textContent=aimPlace.name;
  $('aim-url').textContent=aimPlace.source;
  $('aim-note').value=aimPlace.desc.slice(0,50);$('aim-time').value='10:00';$('aim-type').value='景點';
  $('aim-day-picker').innerHTML=days.map((d,j)=>`<button class="day-pick-btn${j===aimDayIdx?' active':''}" onclick="setAimDay(${j})">第${j+1}天${d.city?' '+d.city:''}</button>`).join('');
  openModal('add-itin-modal');
};
window.setAimDay=function(i){aimDayIdx=i;document.querySelectorAll('.day-pick-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};
window.saveAddToItin=function(){
  withLock($('aim-save-btn'),async()=>{
    if(!aimPlace||!curTripId)return;
    await addDoc(collection(db,'trips',curTripId,'spots'),{n:aimPlace.name,t:val('aim-time'),type:val('aim-type'),note:val('aim-note'),trans:'',members:[],fullRow:false,day:aimDayIdx,ts:serverTimestamp()});
    closeModal('add-itin-modal');toast(`已加入第${aimDayIdx+1}天`);
  });
};

// ── 記帳 ──
function renderCatFilters(){
  const cats=[...new Set(expenses.map(e=>e.cat))];
  $('cat-filter-row').innerHTML=cats.map(c=>`<button class="cat-filter-btn${curCatFilter===c?' active':''}" style="${curCatFilter===c?`background:${CAT_FG[c]};color:#fff`:''}" onclick="toggleCatFilter('${c}')">${c}</button>`).join('');
}
window.toggleCatFilter=function(cat){curCatFilter=curCatFilter===cat?null:cat;renderCatFilters();renderExpenses();};

function renderBudgetFilter(){
  const t=getCurTrip();
  $('currency-badge').textContent='記帳貨幣：'+(t?.currency||'—');$('currency-badge').style.display='inline-flex';
  $('e-currency-label').textContent=getSymbol();
  const tabs=[{v:'all',l:'全部'},...days.map((d,i)=>({v:i,l:`第${i+1}天 ${d.city||''}`}))];
  $('budget-filter').innerHTML=tabs.map(t=>`<button class="day-filter-btn${t.v===curBudgetDay?' active':''}" onclick="setBDay('${t.v}')">${t.l}</button>`).join('');
  $('e-day').innerHTML=days.map((d,i)=>`<option value="${i}">第${i+1}天${d.city?' ('+d.city+')':''}</option>`).join('');
}
window.setBDay=function(v){curBudgetDay=v==='all'?'all':parseInt(v);renderBudgetFilter();renderExpenses();};

const getFilteredExp=()=>{let l=curBudgetDay==='all'?expenses:expenses.filter(e=>e.day===curBudgetDay);return curCatFilter?l.filter(e=>e.cat===curCatFilter):l;};

function renderExpenses(){
  renderCatFilters();const list=getFilteredExp();
  $('budget-total').textContent=fmt(list.reduce((s,e)=>s+e.amt,0));
  $('exp-list').innerHTML=list.length?list.map(e=>{
    const paidBy=e.splits?Object.entries(e.splits).filter(([,v])=>v>0).map(([k,v])=>`${k} ${fmt(v)}`).join('、'):'';
    return`<div class="exp-item" onclick="openExpModal('${e.id}')"><div class="exp-left"><div class="exp-icon" style="background:${CAT_BG[e.cat]||'#f5f5f5'}">${catSVG(e.cat)}</div><div><div class="exp-name">${e.name}</div><div class="exp-meta">${e.cat} · 第${(e.day||0)+1}天${days[e.day]?' '+days[e.day].city:''}</div></div></div><div style="text-align:right"><div class="exp-amt">${fmt(e.amt)}</div>${paidBy?`<div class="exp-payer">${paidBy}</div>`:''}</div></div>`;
  }).join(''):'<div class="empty">尚無消費記錄</div>';
}

window.updateSplitFromTotal=function(){
  const total=parseFloat(val('e-amt'))||0,members=getMembers();if(!members.length)return;
  const each=Math.round(total/members.length);
  members.forEach(m=>{const inp=$('split-'+m);if(inp&&!inp.dataset.manual)inp.value=each||'';});
  updateSplitNote();
};
window.updateSplitNote=function(){
  const total=parseFloat(val('e-amt'))||0,st=getMembers().reduce((s,m)=>s+(parseFloat($('split-'+m)?.value||0)),0);
  const diff=total-st,note=$('split-note');
  note.textContent=diff===0||total===0?'':`尚有 ${getSymbol()}${Math.abs(diff).toLocaleString()} ${diff>0?'未分配':'超出'}`;
  note.className='split-total-note'+(diff!==0&&total!==0?' error':'');
};
function renderSplitRows(ex={}){
  const members=getMembers(),total=parseFloat(val('e-amt'))||0,each=members.length?Math.round(total/members.length):0;
  $('split-rows').innerHTML=members.map(m=>`<div class="split-member-row"><span class="split-name">${m}</span><input class="split-input" id="split-${m}" type="number" placeholder="0" value="${ex[m]!==undefined?ex[m]:each||''}" oninput="this.dataset.manual=1;updateSplitNote()"></div>`).join('');
  updateSplitNote();
}
window.openExpModal=function(id){
  editExpId=id||null;const isEdit=!!id;
  $('exp-modal-title').textContent=isEdit?'編輯消費':'新增消費';
  $('exp-delete-btn').style.display=isEdit?'block':'none';
  renderBudgetFilter();
  const e=isEdit?expenses.find(x=>x.id===id):null;
  $('e-name').value=e?.name||'';$('e-amt').value=e?.amt||'';
  $('e-cat').value=e?.cat||'餐飲';$('e-day').value=e?.day??curDay;
  renderSplitRows(e?.splits||{});openModal('exp-modal');
};
window.saveExp=function(){
  withLock($('exp-save-btn'),async()=>{
    const name=val('e-name').trim(),amt=parseInt(val('e-amt'))||0;if(!name||!amt||!curTripId)return;
    const splits={};getMembers().forEach(m=>{const v=parseFloat($('split-'+m)?.value||0);if(v)splits[m]=v;});
    const data={name,amt,cat:val('e-cat'),splits,day:parseInt(val('e-day')),ts:serverTimestamp()};
    if(editExpId)await updateDoc(doc(db,'trips',curTripId,'expenses',editExpId),data);
    else await addDoc(collection(db,'trips',curTripId,'expenses'),data);
    closeModal('exp-modal');toast(editExpId?'消費已更新':'消費已記錄');
  });
};
window.deleteExpFromModal=async function(){
  if(!editExpId||!confirm('確定刪除？'))return;
  await deleteDoc(doc(db,'trips',curTripId,'expenses',editExpId));closeModal('exp-modal');toast('已刪除');
};

// ── 結算 ──
window.openSettle=function(){
  const members=getMembers();if(!members.length){toast('尚無成員資料');return;}
  const paid={},owed={};members.forEach(m=>{paid[m]=0;owed[m]=0;});
  expenses.forEach(e=>{
    if(e.splits)Object.entries(e.splits).forEach(([m,v])=>{if(paid[m]!==undefined)paid[m]+=v;});
    const share=e.amt/members.length;members.forEach(m=>{owed[m]+=share;});
  });
  const net={};members.forEach(m=>{net[m]=Math.round((paid[m]||0)-(owed[m]||0));});
  const debtors=members.filter(m=>net[m]<0).map(m=>({name:m,amt:-net[m]}));
  const creditors=members.filter(m=>net[m]>0).map(m=>({name:m,amt:net[m]}));
  const transfers=[];let di=0,ci=0;
  while(di<debtors.length&&ci<creditors.length){
    const d=debtors[di],cr=creditors[ci],amt=Math.min(d.amt,cr.amt);
    transfers.push({from:d.name,to:cr.name,amt});d.amt-=amt;cr.amt-=amt;
    if(d.amt===0)di++;if(cr.amt===0)ci++;
  }
  $('settle-content').innerHTML=`
    <div style="margin-bottom:14px">${members.map(m=>`<div class="settle-row"><div><div class="settle-name">${av(m)} ${m}</div><div class="settle-detail">付了 ${fmt(paid[m]||0)} · 應付 ${fmt(Math.round(owed[m]||0))}</div></div><div class="settle-amount ${net[m]>0?'receive':net[m]<0?'owe':'even'}">${net[m]>0?'待收 '+fmt(net[m]):net[m]<0?'待付 '+fmt(-net[m]):'已結清'}</div></div>`).join('')}</div>
    ${transfers.length?`<div style="font-size:12px;font-weight:600;color:var(--sub);margin-bottom:8px">建議轉帳</div>${transfers.map(t=>`<div class="debt-row"><span>${t.from} → ${t.to}</span><span style="color:var(--red);font-weight:600">${fmt(t.amt)}</span></div>`).join('')}`:''}`;
  openModal('settle-modal');
};
