<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊助手">
<title>旅遊助手</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--c:#2e7d9f;--ca:#e8f4fd;--cb:#185fa5;--warn:#ba7517;--warnbg:#fff8f0;--warnborder:#fac775;--red:#d94f3d;--border:#eee;--sub:#888;--r:13px}
html,body{height:100%;overflow:hidden;position:fixed;width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#222;font-size:15px;background:#f5f5f0}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto;background:#fff}
.header{background:var(--c);color:#fff;padding:52px 16px 14px;flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end}
.header-left h1{font-size:17px;font-weight:600}
.header-left .sub{font-size:12px;opacity:.8;margin-top:2px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4caf50}
.sync-dot.off{background:#ff5252}
.sync-dot.syncing{background:#ffeb3b;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.nav{display:flex;background:#fff;border-top:.5px solid #ddd;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;font-size:10px;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:var(--c)}
.nav-icon{font-size:22px;line-height:1}

.trip-selector{background:#f0f8ff;border:.5px solid #b5d4f4;border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.trip-selector .ts-name{font-size:15px;font-weight:600;color:var(--cb)}
.trip-selector .ts-date{font-size:12px;color:var(--sub);margin-top:2px}

.screen{position:fixed;inset:0;background:#f5f5f0;z-index:400;display:none;flex-direction:column;max-width:430px;margin:0 auto}
.screen.open{display:flex}
.screen-header{background:var(--c);color:#fff;padding:52px 16px 14px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0}
.screen-header h2{font-size:17px;font-weight:600}
.screen-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.screen-footer{padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));background:#fff;border-top:.5px solid #ddd}

.trip-item{background:#fff;border:.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.trip-item.active-trip{border-color:var(--c);background:#f0f8ff}
.ti-name{font-size:15px;font-weight:600}
.ti-meta{font-size:12px;color:var(--sub);margin-top:3px}
.icon-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--sub)}
.active-badge{background:var(--c);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px}

.trip-card{background:linear-gradient(135deg,var(--c),#4aa8c8);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:14px}
.trip-card h2{font-size:19px;font-weight:600;margin-bottom:4px}
.trip-card .dates{font-size:12px;opacity:.85;margin-bottom:14px}
.trip-stats{display:flex;gap:8px}
.stat{background:rgba(255,255,255,.2);border-radius:10px;padding:10px;flex:1;text-align:center}
.stat .num{font-size:20px;font-weight:600}
.stat .lbl{font-size:10px;opacity:.85;margin-top:1px}
.countdown{background:var(--ca);border:.5px solid #b5d4f4;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px}
.countdown .days{font-size:34px;font-weight:600;color:var(--c)}
.countdown .lbl{font-size:12px;color:var(--sub);margin-top:3px}
.sec-label{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:600;letter-spacing:.5px}
.chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--ca);color:var(--cb);border:.5px solid #b5d4f4;border-radius:20px;padding:6px 13px;font-size:13px}
.members-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.member{background:var(--ca);color:var(--cb);border:.5px solid #b5d4f4;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600}

.day-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.day-scroll::-webkit-scrollbar{display:none}
.day-btn{padding:7px 12px;border-radius:20px;border:.5px solid #ddd;background:#fff;font-size:11px;cursor:pointer;white-space:nowrap;color:#555;line-height:1.4;text-align:center;flex-shrink:0}
.day-btn.active{background:var(--c);color:#fff;border-color:var(--c)}
.stay-badge{background:var(--warnbg);border:.5px solid var(--warnborder);border-radius:8px;padding:6px 12px;font-size:12px;color:#633806;margin-bottom:12px;display:inline-flex;align-items:center;gap:5px}
.itin-item{display:flex;gap:10px;margin-bottom:10px}
.time-col{width:42px;font-size:11px;color:var(--sub);padding-top:4px;text-align:right;flex-shrink:0}
.tl{width:2px;background:#eee;position:relative;flex-shrink:0}
.dot{width:10px;height:10px;background:var(--c);border-radius:50%;position:absolute;top:5px;left:-4px}
.itin-card{flex:1;background:#fff;border:.5px solid var(--border);border-radius:12px;padding:11px;position:relative}
.itin-card h4{font-size:14px;font-weight:600;margin-bottom:4px;padding-right:56px}
.itin-card .meta{font-size:11px;color:var(--sub);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.card-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;color:#ccc;line-height:1}
.card-btn:active{color:var(--c)}
.card-btn.del:active{color:var(--red)}
.tag{border-radius:6px;padding:2px 7px;font-size:11px}
.tag-spot{background:var(--ca);color:var(--cb)}
.tag-food{background:#fff8f0;color:#ba7517}
.tag-shop{background:#fef3f0;color:var(--red)}
.tag-move{background:#e8f5ee;color:#0f6e56}
.tag-stay{background:#f0f0ff;color:#5050c8}
.transport-hint{background:#e8f5ee;border-radius:9px;padding:8px 12px;margin:6px 0 6px 52px;font-size:12px;color:#0f6e56}
.add-btn{width:100%;margin-top:8px;padding:13px;border:.5px dashed #ccc;background:none;border-radius:12px;color:#aaa;font-size:13px;cursor:pointer}
.day-actions{display:flex;gap:8px;margin-bottom:12px}
.day-action-btn{flex:1;padding:10px;border:.5px solid #ddd;background:#fff;border-radius:10px;font-size:12px;cursor:pointer;color:#555;text-align:center}

/* EXPLORE */
.explore-hint{background:#f0f8ff;border:.5px solid #b5d4f4;border-radius:12px;padding:14px;margin-bottom:14px}
.explore-hint h3{font-size:14px;font-weight:600;color:var(--cb);margin-bottom:6px}
.explore-hint p{font-size:12px;color:#555;line-height:1.6}
.explore-hint .hint-steps{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.hint-step{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#444}
.hint-num{background:var(--c);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.search-wrap{margin-bottom:12px}
.search-box{display:flex;align-items:center;gap:8px;background:#f0f0eb;border-radius:12px;padding:11px 13px}
.search-box input{border:none;background:none;flex:1;font-size:15px;outline:none;color:#222}
.search-btn{background:var(--c);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
.cat-tabs{display:flex;gap:6px;margin-bottom:12px}
.cat-tab{padding:7px 16px;border-radius:20px;border:.5px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#555}
.cat-tab.active{background:var(--c);color:#fff;border-color:var(--c)}
.place-card{display:flex;gap:11px;background:#fff;border:.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:9px}
.place-thumb{width:56px;height:56px;border-radius:10px;background:#eee;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.place-info{flex:1}
.place-info h4{font-size:14px;font-weight:600;margin-bottom:3px}
.place-info .addr{font-size:11px;color:var(--sub);margin-bottom:3px}
.place-info .pdesc{font-size:12px;color:#444;margin-bottom:5px}
.place-info .pfoot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.rating{font-size:12px;color:#ba7517}
.add-to-btn{background:var(--c);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:500}
.add-to-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-result-box{background:#f8f4ff;border:.5px solid #c5a9f5;border-radius:12px;padding:14px;margin-bottom:12px}
.ai-label{font-size:11px;color:#6c3fc5;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ai-badge{background:linear-gradient(90deg,#6c3fc5,var(--c));color:#fff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}
.dot-pulse{display:flex;gap:4px;align-items:center}
.dot-pulse span{width:7px;height:7px;background:#6c3fc5;border-radius:50%;animation:pulse 1.2s infinite}
.dot-pulse span:nth-child(2){animation-delay:.2s}
.dot-pulse span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* BUDGET */
.budget-card{background:var(--warnbg);border:.5px solid var(--warnborder);border-radius:var(--r);padding:16px;margin-bottom:14px}
.budget-card h3{font-size:13px;color:#633806;margin-bottom:4px;font-weight:600}
.budget-total{font-size:28px;font-weight:600;color:#633806;margin-bottom:2px}
.budget-sub{font-size:12px;color:#ba7517;margin-bottom:10px}
.budget-by-cat{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{background:#fff;border-radius:20px;padding:5px 11px;font-size:12px;color:#633806;border:.5px solid var(--warnborder)}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 12px;border-radius:20px;border:.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0}
.filter-btn.active{background:var(--warn);color:#fff;border-color:var(--warn)}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#fff;border:.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer}
.exp-item:active{background:#f9f9f9}
.exp-left{display:flex;align-items:center;gap:10px}
.exp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:#fff8f0}
.exp-name{font-size:14px;font-weight:500}
.exp-meta{font-size:11px;color:var(--sub)}
.exp-right{display:flex;align-items:center;gap:8px}
.exp-amt{font-size:15px;font-weight:600;color:#633806}
.exp-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:4px}
.add-exp-btn{width:100%;padding:14px;background:var(--c);color:#fff;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-weight:600}
.empty{text-align:center;color:#bbb;padding:36px 0;font-size:13px;line-height:2}

/* CURRENCY BADGE */
.currency-badge{display:inline-flex;align-items:center;gap:6px;background:var(--ca);border:.5px solid #b5d4f4;border-radius:20px;padding:5px 12px;font-size:12px;color:var(--cb);margin-bottom:14px}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:430px;max-width:100%;max-height:88dvh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.frow{margin-bottom:11px}
.frow label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;padding:10px 12px;border:.5px solid #ddd;border-radius:9px;font-size:14px;background:#fff;color:#222;font-family:inherit;-webkit-appearance:none}
.frow textarea{resize:none;height:68px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:13px;border:.5px solid #ddd;background:#fff;border-radius:11px;font-size:14px;cursor:pointer;color:#555}
.btn-save{flex:1;padding:13px;border:none;background:var(--c);color:#fff;border-radius:11px;font-size:14px;cursor:pointer;font-weight:600}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{padding:13px;border:none;background:var(--red);color:#fff;border-radius:11px;font-size:14px;cursor:pointer;font-weight:600;width:100%;margin-top:8px}
.full-btn{width:100%;padding:13px;border:none;background:var(--c);color:#fff;border-radius:11px;font-size:14px;cursor:pointer;font-weight:600;margin-bottom:8px}

/* day picker in explore */
.day-picker-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.day-picker-row::-webkit-scrollbar{display:none}
.day-pick-btn{padding:6px 12px;border-radius:20px;border:.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0}
.day-pick-btn.active{background:var(--c);color:#fff;border-color:var(--c)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>🗾 旅遊助手</h1>
      <div class="sub" id="header-sub">載入中…</div>
    </div>
    <div class="sync-dot off" id="sync-dot"></div>
  </div>
  <div class="pages">
    <div class="page active" id="page-home">
      <div class="trip-selector" onclick="openTripList()">
        <div><div class="ts-name" id="ts-name">選擇行程</div><div class="ts-date" id="ts-date">點此切換旅行</div></div>
        <div style="font-size:18px;color:var(--c)">⌄</div>
      </div>
      <div id="home-content"><div class="empty">尚未選擇行程</div></div>
    </div>

    <div class="page" id="page-itinerary">
      <div class="day-scroll" id="day-tabs"></div>
      <div id="stay-badge"></div>
      <div class="day-actions">
        <button class="day-action-btn" onclick="openAddDay()">＋ 新增一天</button>
        <button class="day-action-btn" onclick="deleteCurrentDay()" style="color:var(--red);border-color:#fcc">刪除此天</button>
      </div>
      <div id="itin-body"></div>
      <button class="add-btn" onclick="openSpotModal()">＋ 新增景點</button>
    </div>

    <div class="page" id="page-explore">
      <div class="explore-hint">
        <h3>✨ 探索景點與餐廳</h3>
        <div class="hint-steps">
          <div class="hint-step"><div class="hint-num">1</div><span>選擇類別（景點／餐廳／購物）</span></div>
          <div class="hint-step"><div class="hint-num">2</div><span>輸入地點或關鍵字，例如「箱根 溫泉」、「鎌倉 甜點」</span></div>
          <div class="hint-step"><div class="hint-num">3</div><span>點「＋ 加入行程」把搜尋結果直接加到當天行程</span></div>
        </div>
      </div>
      <div class="cat-tabs">
        <button class="cat-tab active" onclick="setCat(this,'景點')">景點</button>
        <button class="cat-tab" onclick="setCat(this,'餐廳')">餐廳</button>
        <button class="cat-tab" onclick="setCat(this,'購物')">購物</button>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <span style="color:#aaa;font-size:17px">🔍</span>
          <input id="q-input" type="text" placeholder="例：箱根 溫泉、鎌倉 甜點…" onkeydown="if(event.key==='Enter')doSearch()">
          <button class="search-btn" id="search-btn" onclick="doSearch()">搜尋</button>
        </div>
      </div>
      <div id="ai-result"></div>
      <div id="preset-list"></div>
    </div>

    <div class="page" id="page-budget">
      <div id="currency-display"></div>
      <div class="budget-card">
        <h3>總消費</h3>
        <div class="budget-total" id="budget-total">—</div>
        <div class="budget-sub" id="budget-sub">共 0 筆記錄</div>
        <div class="budget-by-cat" id="budget-by-cat"></div>
      </div>
      <div class="filter-row" id="budget-filter"></div>
      <div id="exp-list"></div>
      <button class="add-exp-btn" onclick="openExpModal(null)">＋ 新增消費</button>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('home',this)"><span class="nav-icon">🏠</span>首頁</button>
    <button class="nav-btn" onclick="showPage('itinerary',this)"><span class="nav-icon">📅</span>行程</button>
    <button class="nav-btn" onclick="showPage('explore',this)"><span class="nav-icon">✨</span>探索</button>
    <button class="nav-btn" onclick="showPage('budget',this)"><span class="nav-icon">🧾</span>記帳</button>
  </nav>
</div>

<!-- Trip List Screen -->
<div class="screen" id="trip-list-screen">
  <div class="screen-header">
    <h2>我的旅行</h2>
    <button onclick="closeTripList()" style="background:none;border:none;color:#fff;font-size:15px;cursor:pointer;padding:4px 8px">關閉</button>
  </div>
  <div class="screen-body" id="trip-list-body"></div>
  <div class="screen-footer"><button class="full-btn" onclick="openNewTripModal()">＋ 新增旅行</button></div>
</div>

<div class="toast" id="toast"></div>

<!-- Trip Modal -->
<div class="overlay" id="trip-modal">
  <div class="modal">
    <h3 id="trip-modal-title">新增旅行</h3>
    <div class="frow"><label>旅行名稱</label><input id="tm-name" placeholder="例：日本關西之旅"></div>
    <div class="frow"><label>副標題</label><input id="tm-sub" placeholder="例：東京・橫濱・箱根"></div>
    <div class="frow"><label>出發日期</label><input id="tm-start" type="date"></div>
    <div class="frow"><label>回程日期</label><input id="tm-end" type="date"></div>
    <div class="frow"><label>成員（逗號分隔）</label><input id="tm-members" placeholder="例：Dan,Co,魚,月"></div>
    <div class="frow"><label>城市（逗號分隔）</label><input id="tm-cities" placeholder="例：東京,橫濱,箱根"></div>
    <div class="frow"><label>記帳貨幣</label>
      <select id="tm-currency">
        <option value="¥ 日圓">¥ 日圓</option>
        <option value="$ 美元">$ 美元</option>
        <option value="€ 歐元">€ 歐元</option>
        <option value="£ 英鎊">£ 英鎊</option>
        <option value="₩ 韓元">₩ 韓元</option>
        <option value="NT$ 台幣">NT$ 台幣</option>
        <option value="HK$ 港幣">HK$ 港幣</option>
        <option value="฿ 泰銖">฿ 泰銖</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="trip-cancel-btn">取消</button>
      <button class="btn-save" id="trip-save-btn" onclick="saveTrip()">儲存</button>
    </div>
  </div>
</div>

<!-- Spot Modal -->
<div class="overlay" id="spot-modal">
  <div class="modal">
    <h3 id="spot-modal-title">新增景點</h3>
    <div class="frow"><label>名稱</label><input id="s-name" placeholder="例：鶴岡八幡宮"></div>
    <div class="frow"><label>時間</label><input id="s-time" type="time" value="10:00"></div>
    <div class="frow"><label>類型</label>
      <select id="s-type"><option>景點</option><option>餐廳</option><option>購物</option><option>交通</option><option>住宿</option></select>
    </div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fb=initializeApp({apiKey:"AIzaSyDnY5wcb0QXOPXzAvRmrqltESS_U5afCS8",authDomain:"travel-app-38ad8.firebaseapp.com",projectId:"travel-app-38ad8",storageBucket:"travel-app-38ad8.firebasestorage.app",messagingSenderId:"306708070000",appId:"1:306708070000:web:716f2db183d2e432357eb5"});
const db=getFirestore(fb);

const ICONS={景點:'🏛',餐廳:'🍜',購物:'🛍',交通:'🚆',住宿:'🏨',餐飲:'🍱',景點門票:'🎟',其他:'📦'};
const TAG={景點:'tag-spot',餐廳:'tag-food',購物:'tag-shop',交通:'tag-move',住宿:'tag-stay'};

let trips=[],curTripId=null,curDay=0,curBudgetDay='all',curCat='景點';
let spots=[],expenses=[],days=[];
let editSpotId=null,editExpId=null,editTripId=null;
let spotsUnsub=null,expUnsub=null,daysUnsub=null;
let aimPlace=null,aimDayIdx=0;

// ── LOCK ── prevent double-taps
let saving=false;
function withLock(btn,fn){
  if(saving)return;
  saving=true;
  if(btn){btn.disabled=true;btn.textContent=btn.textContent.replace('儲存','儲存中…').replace('新增','新增中…');}
  Promise.resolve(fn()).finally(()=>{
    saving=false;
    if(btn){btn.disabled=false;btn.textContent=btn.textContent.replace('儲存中…','儲存').replace('新增中…','新增');}
  });
}

// ── UTILS ──
function setSyncDot(s){document.getElementById('sync-dot').className='sync-dot '+(s==='on'?'on':s==='syncing'?'syncing':'off');}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

// ── MODALS ──
// All cancel buttons wired here — guaranteed to work
function setupModal(overlayId,cancelBtnId){
  const overlay=document.getElementById(overlayId);
  const cancelBtn=document.getElementById(cancelBtnId);
  if(cancelBtn) cancelBtn.addEventListener('click',()=>overlay.classList.remove('open'));
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open');});
}
setupModal('trip-modal','trip-cancel-btn');
setupModal('spot-modal','spot-cancel-btn');
setupModal('add-day-modal','addday-cancel-btn');
setupModal('exp-modal','exp-cancel-btn');
setupModal('add-itin-modal','aim-cancel-btn');

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
window.closeModal=closeModal;

window.showPage=function(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
};

// ── TRIPS ──
onSnapshot(query(collection(db,'trips'),orderBy('ts')),snap=>{
  trips=[];snap.forEach(d=>trips.push({...d.data(),id:d.id}));
  setSyncDot('on');
  renderTripList();
  if(!curTripId&&trips.length>0)selectTrip(trips[0].id);
  else if(curTripId)renderHome();
},()=>setSyncDot('off'));

function renderTripList(){
  document.getElementById('trip-list-body').innerHTML=trips.length?trips.map(t=>`
    <div class="trip-item${t.id===curTripId?' active-trip':''}" onclick="selectTrip('${t.id}')">
      <div><div class="ti-name">${t.name}</div>
      <div class="ti-meta">${t.startDate||''}${t.endDate?' → '+t.endDate:''} · ${(t.members||[]).join('、')} · ${t.currency||'¥ 日圓'}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        ${t.id===curTripId?'<span class="active-badge">使用中</span>':''}
        <button class="icon-btn" onclick="event.stopPropagation();openEditTrip('${t.id}')">✏️</button>
        <button class="icon-btn" onclick="event.stopPropagation();deleteTrip('${t.id}')">🗑</button>
      </div>
    </div>`).join(''):'<div class="empty">尚無旅行<br>點下方新增</div>';
}

window.selectTrip=function(id){
  curTripId=id;curDay=0;
  const t=trips.find(x=>x.id===id);
  if(t){
    document.getElementById('ts-name').textContent=t.name;
    document.getElementById('ts-date').textContent=(t.startDate||'')+(t.endDate?' → '+t.endDate:'');
    document.getElementById('header-sub').textContent=t.subtitle||t.name;
  }
  closeTripList();
  subscribeTrip();
  renderHome();
};

function getCurTrip(){return trips.find(x=>x.id===curTripId);}
function getCurrency(){const t=getCurTrip();return t?t.currency||'¥ 日圓':'¥ 日圓';}

function subscribeTrip(){
  if(spotsUnsub)spotsUnsub();if(expUnsub)expUnsub();if(daysUnsub)daysUnsub();
  if(!curTripId)return;
  daysUnsub=onSnapshot(query(collection(db,'trips',curTripId,'days'),orderBy('order')),snap=>{
    days=[];snap.forEach(d=>days.push({...d.data(),id:d.id}));
    renderDayTabs();renderItinerary();renderBudgetDayFilter();
  });
  spotsUnsub=onSnapshot(query(collection(db,'trips',curTripId,'spots'),orderBy('ts')),snap=>{
    spots=[];snap.forEach(d=>spots.push({...d.data(),id:d.id}));
    renderItinerary();
  });
  expUnsub=onSnapshot(query(collection(db,'trips',curTripId,'expenses'),orderBy('ts')),snap=>{
    expenses=[];snap.forEach(d=>expenses.push({...d.data(),id:d.id}));
    renderExpenses();
  });
}

// ── HOME ──
function renderHome(){
  const t=getCurTrip();
  if(!t){document.getElementById('home-content').innerHTML='<div class="empty">請選擇行程</div>';return;}
  const start=t.startDate?new Date(t.startDate):null;
  const end=t.endDate?new Date(t.endDate):null;
  const diffDays=start&&end?Math.round((end-start)/86400000)+1:0;
  const today=new Date();today.setHours(0,0,0,0);
  const dl=start?Math.ceil((start-today)/86400000):null;
  const cdText=dl===null?'—':dl>0?dl:dl===0?'今天出發！🎉':'旅行中 ✈️';
  const cdLabel=dl>0?'距離出發還有幾天':dl===0||dl<0?'':' ';
  document.getElementById('home-content').innerHTML=`
    <div class="trip-card"><h2>${t.name}</h2>
      <div class="dates">${t.startDate||''}${t.endDate?' ─ '+t.endDate:''}</div>
      <div class="trip-stats">
        <div class="stat"><div class="num">${diffDays||'?'}</div><div class="lbl">天數</div></div>
        <div class="stat"><div class="num">${(t.members||[]).length||'?'}</div><div class="lbl">成員</div></div>
        <div class="stat"><div class="num">${(t.cities||[]).length||'?'}</div><div class="lbl">城市</div></div>
      </div>
    </div>
    <div class="countdown"><div class="days">${cdText}</div><div class="lbl">${cdLabel}</div></div>
    ${(t.members||[]).length?`<div class="sec-label">旅遊成員</div><div class="members-row">${t.members.map(m=>`<div class="member">${m}</div>`).join('')}</div>`:''}
    ${(t.cities||[]).length?`<div class="sec-label">旅遊地區</div><div class="chip-row">${t.cities.map(c=>`<div class="chip">${c}</div>`).join('')}</div>`:''}
    <div class="sec-label">記帳貨幣</div>
    <div class="currency-badge">💰 ${t.currency||'¥ 日圓'}</div>
    <button class="add-btn" style="margin-top:4px" onclick="openEditTrip('${t.id}')">✏️ 編輯旅行資料</button>`;
}

// ── TRIP MODAL ──
window.openNewTripModal=function(){
  editTripId=null;
  document.getElementById('trip-modal-title').textContent='新增旅行';
  ['tm-name','tm-sub','tm-start','tm-end','tm-members','tm-cities'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tm-currency').value='¥ 日圓';
  closeModal('trip-list-screen');
  openModal('trip-modal');
};
window.openEditTrip=function(id){
  editTripId=id;
  const t=trips.find(x=>x.id===id);if(!t)return;
  document.getElementById('trip-modal-title').textContent='編輯旅行';
  document.getElementById('tm-name').value=t.name||'';
  document.getElementById('tm-sub').value=t.subtitle||'';
  document.getElementById('tm-start').value=t.startDate||'';
  document.getElementById('tm-end').value=t.endDate||'';
  document.getElementById('tm-members').value=(t.members||[]).join(',');
  document.getElementById('tm-cities').value=(t.cities||[]).join(',');
  document.getElementById('tm-currency').value=t.currency||'¥ 日圓';
  openModal('trip-modal');
};
window.saveTrip=function(){
  withLock(document.getElementById('trip-save-btn'),async()=>{
    const name=document.getElementById('tm-name').value.trim();if(!name)return;
    const data={name,subtitle:document.getElementById('tm-sub').value.trim(),
      startDate:document.getElementById('tm-start').value,endDate:document.getElementById('tm-end').value,
      members:document.getElementById('tm-members').value.split(',').map(s=>s.trim()).filter(Boolean),
      cities:document.getElementById('tm-cities').value.split(',').map(s=>s.trim()).filter(Boolean),
      currency:document.getElementById('tm-currency').value,ts:serverTimestamp()};
    setSyncDot('syncing');
    if(editTripId)await updateDoc(doc(db,'trips',editTripId),data);
    else{const ref=await addDoc(collection(db,'trips'),data);if(!curTripId)selectTrip(ref.id);}
    closeModal('trip-modal');toast('旅行資料已儲存 ✓');setSyncDot('on');
  });
};
window.deleteTrip=async function(id){
  if(!confirm('確定刪除這個旅行？'))return;
  await deleteDoc(doc(db,'trips',id));
  if(curTripId===id){curTripId=null;document.getElementById('home-content').innerHTML='<div class="empty">請選擇行程</div>';}
  toast('旅行已刪除');
};
window.openTripList=function(){document.getElementById('trip-list-screen').classList.add('open');};
window.closeTripList=function(){document.getElementById('trip-list-screen').classList.remove('open');};

// ── DAYS ──
function renderDayTabs(){
  document.getElementById('day-tabs').innerHTML=days.map((d,i)=>
    `<button class="day-btn${i===curDay?' active':''}" onclick="setDay(${i})">第${i+1}天<br><span style="opacity:.7;font-size:10px">${d.city||''}</span></button>`
  ).join('');
}
window.setDay=function(i){curDay=i;renderDayTabs();renderItinerary();};
window.openAddDay=function(){
  document.getElementById('ad-city').value='';document.getElementById('ad-stay').value='';
  openModal('add-day-modal');
};
window.saveNewDay=function(){
  withLock(document.getElementById('addday-save-btn'),async()=>{
    if(!curTripId)return;
    await addDoc(collection(db,'trips',curTripId,'days'),{city:document.getElementById('ad-city').value.trim(),stay:document.getElementById('ad-stay').value.trim(),order:days.length,ts:serverTimestamp()});
    closeModal('add-day-modal');toast('已新增一天 ✓');
  });
};
window.deleteCurrentDay=async function(){
  if(!days[curDay]){toast('尚無此天');return;}
  if(!confirm('確定刪除此天？景點也會一併刪除。'))return;
  const dayId=days[curDay].id;
  for(const s of spots.filter(s=>s.day===curDay))await deleteDoc(doc(db,'trips',curTripId,'spots',s.id));
  await deleteDoc(doc(db,'trips',curTripId,'days',dayId));
  if(curDay>0)curDay--;
  toast('已刪除此天');
};

// ── ITINERARY ──
function renderItinerary(){
  if(!days.length){
    document.getElementById('stay-badge').innerHTML='';
    document.getElementById('itin-body').innerHTML='<div class="empty">尚未建立行程天數<br>點「＋ 新增一天」開始</div>';return;
  }
  const d=days[curDay];if(!d)return;
  document.getElementById('stay-badge').innerHTML=`<div class="stay-badge">🏨 今晚：${d.stay||'未設定'}</div>`;
  const items=spots.filter(s=>s.day===curDay).sort((a,b)=>a.t.localeCompare(b.t));
  document.getElementById('itin-body').innerHTML=items.length?items.map(s=>`
    <div class="itin-item">
      <div class="time-col">${s.t}</div>
      <div class="tl"><div class="dot"></div></div>
      <div class="itin-card">
        <div class="card-actions">
          <button class="card-btn" onclick="openEditSpot('${s.id}')">✏️</button>
          <button class="card-btn del" onclick="delSpot('${s.id}')">✕</button>
        </div>
        <h4>${ICONS[s.type]||'📍'} ${s.n}</h4>
        <div class="meta"><span class="tag ${TAG[s.type]||'tag-spot'}">${s.type}</span>${s.note?`<span>${s.note}</span>`:''}</div>
      </div>
    </div>
    ${s.trans?`<div class="transport-hint">🚆 ${s.trans}</div>`:''}`).join('')
    :'<div class="empty">今天還沒有行程<br>點下方新增</div>';
}
window.openSpotModal=function(){
  editSpotId=null;
  document.getElementById('spot-modal-title').textContent='新增景點';
  document.getElementById('s-name').value='';document.getElementById('s-time').value='10:00';
  document.getElementById('s-note').value='';document.getElementById('s-trans').value='';
  document.getElementById('s-type').value='景點';
  openModal('spot-modal');
};
window.openEditSpot=function(id){
  editSpotId=id;const s=spots.find(x=>x.id===id);if(!s)return;
  document.getElementById('spot-modal-title').textContent='編輯景點';
  document.getElementById('s-name').value=s.n||'';document.getElementById('s-time').value=s.t||'10:00';
  document.getElementById('s-type').value=s.type||'景點';document.getElementById('s-note').value=s.note||'';
  document.getElementById('s-trans').value=s.trans||'';
  openModal('spot-modal');
};
window.saveSpot=function(){
  withLock(document.getElementById('spot-save-btn'),async()=>{
    const n=document.getElementById('s-name').value.trim();if(!n||!curTripId)return;
    const data={n,t:document.getElementById('s-time').value,type:document.getElementById('s-type').value,
      note:document.getElementById('s-note').value,trans:document.getElementById('s-trans').value,day:curDay,ts:serverTimestamp()};

    if(editSpotId)await updateDoc(doc(db,'trips',curTripId,'spots',editSpotId),data);

    closeModal('spot-modal');toast(editSpotId?'景點已更新 ✓':'景點已儲存 ✓');setSyncDot('on');
  });
};
window.delSpot=async function(id){
  if(!confirm('確定刪除？'))return;

};

  btn.disabled=true;btn.textContent='搜尋中…';
  const box=document.getElementById('ai-result');
  box.innerHTML=`<div class="ai-result-box"><div class="ai-label">✨ AI 搜尋中</div>
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      <span style="font-size:13px;color:#6c3fc5">正在搜尋「${q}」的${curCat}…</span>
    </div></div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:
        `你是專業日本旅遊嚮導。使用者搜尋：「${q}」，類別：${curCat}。推薦5個真實地點，繁體中文，只輸出JSON陣列：[{"name":"名稱","city":"城市","desc":"簡介20字內","tip":"小提示15字內","rating":4.5,"icon":"emoji"}]`
      }]})});
    const data=await res.json();
    const places=JSON.parse(data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    box.innerHTML=`<div class="ai-result-box">
      <div class="ai-label">✨ 搜尋結果：${q} <span class="ai-badge">AI</span></div>
      ${places.map(p=>placeCardHTML(p,true)).join('')}
    </div>`;
  }catch(e){
    box.innerHTML=`<div class="ai-result-box"><div class="ai-label">搜尋失敗，請稍後再試</div></div>`;
  }finally{btn.disabled=false;btn.textContent='搜尋';}
};

// ── ADD TO ITIN FROM EXPLORE ──
window.openAddToItin=function(p){
  if(!curTripId){toast('請先選擇行程');return;}
  if(!days.length){toast('請先在行程頁新增天數');return;}
  aimPlace=p;aimDayIdx=curDay<days.length?curDay:0;
  document.getElementById('aim-name').textContent=p.name;
  document.getElementById('aim-city').textContent='📍 '+p.city;
  document.getElementById('aim-note').value='';
  document.getElementById('aim-time').value='10:00';
  document.getElementById('aim-day-picker').innerHTML=days.map((d,i)=>
    `<button class="day-pick-btn${i===aimDayIdx?' active':''}" onclick="setAimDay(${i})">第${i+1}天${d.city?' '+d.city:''}</button>`
  ).join('');
  openModal('add-itin-modal');
};
window.setAimDay=function(i){
  aimDayIdx=i;
  document.querySelectorAll('.day-pick-btn').forEach((b,idx)=>b.classList.toggle('active',idx===i));
};
window.saveAddToItin=function(){
  withLock(document.getElementById('aim-save-btn'),async()=>{
    if(!aimPlace||!curTripId)return;
    await addDoc(collection(db,'trips',curTripId,'spots'),{
      n:aimPlace.name,t:document.getElementById('aim-time').value,
      type:curCat,note:document.getElementById('aim-note').value,
      trans:'',day:aimDayIdx,ts:serverTimestamp()
    });
    closeModal('add-itin-modal');
    toast(`已加入第${aimDayIdx+1}天行程 ✓`);
  });
};

// ── BUDGET ──
function renderBudgetDayFilter(){
  const cur=getCurTrip();
  const sym=cur?cur.currency||'¥ 日圓':'¥ 日圓';
  document.getElementById('currency-display').innerHTML=`<div class="currency-badge">💰 記帳貨幣：${sym}</div>`;
  document.getElementById('e-currency-label').textContent=sym;
  const tabs=[{v:'all',l:'全部'},...days.map((d,i)=>({v:i,l:`第${i+1}天 ${d.city||''}`}))];
  document.getElementById('budget-filter').innerHTML=tabs.map(t=>
    `<button class="filter-btn${t.v===curBudgetDay?' active':''}" onclick="setBDay('${t.v}')">${t.l}</button>`
  ).join('');
  document.getElementById('e-day').innerHTML=days.map((d,i)=>
    `<option value="${i}">第${i+1}天${d.city?' ('+d.city+')':''}</option>`).join('');
}
window.setBDay=function(v){curBudgetDay=v==='all'?'all':parseInt(v);renderBudgetDayFilter();renderExpenses();};
function renderExpenses(){
  const sym=(getCurTrip()||{}).currency||'¥';
  const symShort=sym.split(' ')[0];
  const list=curBudgetDay==='all'?expenses:expenses.filter(e=>e.day===curBudgetDay);
  const total=expenses.reduce((s,e)=>s+e.amt,0);
  document.getElementById('budget-total').textContent=symShort+total.toLocaleString();
  document.getElementById('budget-sub').textContent=`共 ${expenses.length} 筆記錄`;
  const cats={};expenses.forEach(e=>cats[e.cat]=(cats[e.cat]||0)+e.amt);
  document.getElementById('budget-by-cat').innerHTML=Object.entries(cats).map(([c,a])=>
    `<span class="cat-pill">${ICONS[c]||'📦'} ${c} ${symShort}${a.toLocaleString()}</span>`).join('');
  document.getElementById('exp-list').innerHTML=list.length?list.map(e=>`
    <div class="exp-item" onclick="openExpModal('${e.id}')">
      <div class="exp-left">
        <div class="exp-icon">${ICONS[e.cat]||'📦'}</div>
        <div><div class="exp-name">${e.name}</div>
        <div class="exp-meta">${e.cat}・第${(e.day||0)+1}天${days[e.day]?' '+days[e.day].city:''}</div></div>
      </div>
      <div class="exp-amt">${symShort}${e.amt.toLocaleString()}</div>
    </div>`).join(''):'<div class="empty">尚無消費記錄<br>點下方按鈕新增</div>';
}
window.openExpModal=function(id){
  editExpId=id||null;
  const isEdit=!!id;
  document.getElementById('exp-modal-title').textContent=isEdit?'編輯消費':'新增消費';
  document.getElementById('exp-delete-btn').style.display=isEdit?'block':'none';
  renderBudgetDayFilter();
  if(isEdit){
    const e=expenses.find(x=>x.id===id);if(!e)return;
    document.getElementById('e-name').value=e.name||'';
    document.getElementById('e-amt').value=e.amt||'';
    document.getElementById('e-cat').value=e.cat||'餐飲';
    document.getElementById('e-day').value=e.day||0;
  }else{
    document.getElementById('e-name').value='';document.getElementById('e-amt').value='';
  }
  openModal('exp-modal');
};
window.saveExp=function(){
  withLock(document.getElementById('exp-save-btn'),async()=>{
    const name=document.getElementById('e-name').value.trim();
    const amt=parseInt(document.getElementById('e-amt').value)||0;
    if(!name||!amt||!curTripId)return;
    const data={name,amt,cat:document.getElementById('e-cat').value,day:parseInt(document.getElementById('e-day').value),ts:serverTimestamp()};
    setSyncDot('syncing');
    if(editExpId)await updateDoc(doc(db,'trips',curTripId,'expenses',editExpId),data);
    else await addDoc(collection(db,'trips',curTripId,'expenses'),data);
    closeModal('exp-modal');toast(editExpId?'消費已更新 ✓':'消費已記錄 ✓');setSyncDot('on');
  });
};
window.deleteExpFromModal=async function(){
  if(!editExpId||!confirm('確定刪除這筆消費？'))return;
  await deleteDoc(doc(db,'trips',curTripId,'expenses',editExpId));
  closeModal('exp-modal');toast('已刪除');
};

// ── INIT ──
renderPresets();
</script>
