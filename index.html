<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊助手">
<title>旅遊助手</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c:#2e7d9f;--ca:#e8f4fd;--cb:#185fa5;
  --warn:#ba7517;--warnbg:#fff8f0;--warnborder:#fac775;
  --red:#c0392b;--green:#27ae60;
  --border:#e8e8e8;--sub:#8a8a8e;--r:13px;
  --col-w:300px;--card-h:90px;--time-w:44px;
}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;background:#f2f2f7}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:#1c1c1e;font-size:15px}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:#f2f2f7}
.header{background:var(--c);color:#fff;padding:56px 16px 12px;flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end}
.header h1{font-size:17px;font-weight:600}
.header .sub{font-size:12px;opacity:.75;margin-top:2px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#34c759;margin-bottom:3px}
.sync-dot.off{background:#ff3b30}.sync-dot.syncing{background:#ffd60a;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(80px + env(safe-area-inset-bottom));display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page#page-itinerary{padding:0;overflow:hidden;display:none;flex-direction:column}
.page#page-itinerary.active{display:flex}
.nav{display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-top:.5px solid rgba(0,0,0,.1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;font-size:9px;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:var(--c)}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

/* HOME */
.trip-selector{background:#fff;border-radius:var(--r);padding:13px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ts-name{font-size:15px;font-weight:600;color:var(--cb)}
.ts-date{font-size:12px;color:var(--sub);margin-top:2px}
.trip-card{background:linear-gradient(135deg,var(--c),#3d9ec0);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:12px}
.trip-card h2{font-size:20px;font-weight:700;margin-bottom:3px}
.trip-card .dates{font-size:12px;opacity:.8;margin-bottom:14px}
.trip-stats{display:flex;gap:8px}
.stat{background:rgba(255,255,255,.18);border-radius:10px;padding:10px;flex:1;text-align:center}
.stat .num{font-size:22px;font-weight:700}
.stat .lbl{font-size:10px;opacity:.8;margin-top:1px}
.countdown{background:#fff;border-radius:var(--r);padding:16px;text-align:center;margin-bottom:12px}
.countdown .days{font-size:36px;font-weight:700;color:var(--c);letter-spacing:-1px}
.countdown .lbl{font-size:12px;color:var(--sub);margin-top:3px}
.sec-label{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.sec-edit{font-size:12px;color:var(--c);cursor:pointer}
.chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.chip{background:#fff;color:var(--cb);border:.5px solid #b5d4f4;border-radius:20px;padding:6px 13px;font-size:13px}
.members-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.member-chip{background:#fff;color:var(--cb);border:.5px solid #b5d4f4;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.m-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:#f2f2f7}
.today-card{background:#fff;border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.today-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid #f2f2f7;cursor:pointer}
.today-header .th-label{font-size:13px;font-weight:600}
.today-header .th-go{font-size:12px;color:var(--c)}
.today-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:.5px solid #f9f9f9}
.tr-time{font-size:11px;color:var(--sub);width:36px;flex-shrink:0;text-align:right}
.tr-dot{width:7px;height:7px;border-radius:50%;background:var(--c);flex-shrink:0}
.tr-name{font-size:13px;flex:1;font-weight:500}
.tr-members{display:flex;gap:3px}
.tr-av{width:18px;height:18px;border-radius:50%;background:#e8f4fd;font-size:11px;display:flex;align-items:center;justify-content:center}
.currency-badge{display:inline-flex;align-items:center;gap:5px;background:var(--ca);border:.5px solid #b5d4f4;border-radius:20px;padding:5px 12px;font-size:12px;color:var(--cb);margin-bottom:12px}
.add-btn{width:100%;margin-top:8px;padding:13px;border:.5px dashed #c0c0c5;background:none;border-radius:12px;color:var(--sub);font-size:13px;cursor:pointer;font-family:inherit}

/* ITINERARY LAYOUT */
.itin-top{flex-shrink:0;padding:12px 16px 0;background:#f2f2f7}
.day-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.day-scroll::-webkit-scrollbar{display:none}
.day-btn{padding:7px 12px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:11px;cursor:pointer;white-space:nowrap;color:#555;line-height:1.4;text-align:center;flex-shrink:0;font-family:inherit}
.day-btn.active{background:var(--c);color:#fff;border-color:var(--c)}
.day-info-bar{background:#fff;border-radius:var(--r);padding:11px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.dib-city{font-size:14px;font-weight:600}
.dib-stay{font-size:12px;color:var(--sub);margin-top:2px}
.dib-edit{background:none;border:none;color:var(--c);font-size:13px;cursor:pointer;padding:5px 10px;border:.5px solid var(--c);border-radius:8px;font-family:inherit}
.itin-actions{display:flex;gap:8px;margin-bottom:10px}
.itin-action-btn{flex:1;padding:9px;border:.5px solid var(--border);background:#fff;border-radius:10px;font-size:12px;cursor:pointer;color:#555;text-align:center;font-family:inherit}
.itin-action-btn.danger{color:var(--red);border-color:#ffd5d0}

/* MULTI-COLUMN SCROLL AREA */
.itin-scroll-wrap{flex:1;overflow:hidden;position:relative}
.itin-hscroll{overflow-x:auto;overflow-y:auto;height:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.itin-hscroll::-webkit-scrollbar{display:none}
.itin-grid{display:flex;min-height:100%;position:relative;padding-bottom:48px}

/* TIME AXIS */
.time-axis{width:var(--time-w);flex-shrink:0;position:sticky;left:0;z-index:10;background:#f2f2f7;padding-top:8px}
.time-slot{height:var(--card-h);display:flex;align-items:flex-start;padding-top:10px;justify-content:flex-end;padding-right:8px}
.time-slot span{font-size:10px;color:var(--sub);white-space:nowrap}

/* COLUMNS */
.col-wrap{display:flex;gap:8px;padding:8px 8px 8px 0;align-items:flex-start}
.col{width:var(--col-w);flex-shrink:0;position:relative}
.col-header{background:#fff;border-radius:10px;padding:7px 10px;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.col-header-members{display:flex;gap:4px;flex-wrap:wrap}
.col-av{width:24px;height:24px;border-radius:50%;background:#e8f4fd;font-size:14px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
.col-label{font-size:11px;color:var(--sub);font-weight:500}

/* CARDS IN COLUMN */
.card-slot{height:var(--card-h);padding:0 0 8px 0;display:flex;align-items:stretch}
.itin-card{flex:1;background:#fff;border-radius:11px;padding:10px 12px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between}
.itin-card.full-width{width:calc(var(--col-w) * var(--cols) + 8px * (var(--cols) - 1));margin-right:8px}
.itin-card h4{font-size:13px;font-weight:600;color:#1c1c1e;padding-right:40px;line-height:1.3}
.itin-card .card-meta{font-size:10px;color:var(--sub);margin-top:3px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.card-tag{border-radius:5px;padding:1px 6px;font-size:10px;font-weight:500}
.tag-spot{background:#e8f4fd;color:#1a6da3}
.tag-food{background:#fff3e0;color:#e65100}
.tag-shop{background:#fce4ec;color:#c2185b}
.tag-move{background:#e8f5e9;color:#2e7d32}
.tag-stay{background:#ede7f6;color:#512da8}
.card-members{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.card-av{width:20px;height:20px;border-radius:50%;background:#e8f4fd;font-size:12px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
.card-actions{position:absolute;top:6px;right:6px;display:flex;gap:2px}
.card-btn{background:none;border:none;cursor:pointer;padding:4px;color:#c0c0c5;border-radius:6px}
.card-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.empty-col{height:var(--card-h);display:flex;align-items:center;justify-content:center}
.card-slot.full-row{position:absolute;left:0}

/* SCROLLBAR INDICATOR */
.scroll-indicator{position:absolute;bottom:0;left:var(--time-w);right:0;height:32px;background:linear-gradient(transparent,rgba(242,242,247,.9));display:flex;align-items:center;padding:0 8px 6px;pointer-events:none}
.scroll-bar-track{flex:1;height:4px;background:rgba(0,0,0,.1);border-radius:2px;overflow:hidden}
.scroll-bar-thumb{height:100%;background:var(--c);border-radius:2px;transition:width .1s}

/* FULL-ROW ZONE */
.full-row-zone{position:relative}

/* EXPLORE */
.explore-hint{background:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.explore-hint h3{font-size:14px;font-weight:600;margin-bottom:8px}
.hint-step{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:#555;margin-bottom:6px}
.hint-num{background:var(--c);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.cat-tabs{display:flex;gap:6px;margin-bottom:12px}
.cat-tab{padding:7px 16px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:13px;cursor:pointer;color:#555;font-family:inherit}
.cat-tab.active{background:var(--c);color:#fff;border-color:var(--c)}
.place-card{display:flex;gap:12px;background:#fff;border-radius:var(--r);padding:13px;margin-bottom:9px}
.place-thumb{width:54px;height:54px;border-radius:10px;background:#f2f2f7;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.place-info{flex:1}
.place-info h4{font-size:14px;font-weight:600;margin-bottom:2px}
.place-info .addr{font-size:11px;color:var(--sub);margin-bottom:3px}
.place-info .pdesc{font-size:12px;color:#555;margin-bottom:5px}
.pfoot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.rating{font-size:12px;color:#ff9500}
.add-to-btn{background:var(--c);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:500;font-family:inherit}

/* BUDGET */
.budget-summary{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px}
.budget-summary h3{font-size:13px;color:var(--sub);margin-bottom:4px;font-weight:500}
.budget-total-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.budget-total{font-size:30px;font-weight:700;color:#1c1c1e;letter-spacing:-1px}
.settle-btn{background:var(--c);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:5px}
.settle-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat-filter-row{display:flex;gap:6px;flex-wrap:wrap}
.cat-filter-btn{padding:5px 11px;border-radius:20px;background:#f2f2f7;border:none;font-size:12px;cursor:pointer;color:#555;font-family:inherit;font-weight:500}
.cat-filter-btn.active{color:#fff}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.day-filter-btn{padding:6px 12px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0;font-family:inherit}
.day-filter-btn.active{background:var(--warn);color:#fff;border-color:var(--warn)}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#fff;border-radius:10px;margin-bottom:8px;cursor:pointer}
.exp-left{display:flex;align-items:center;gap:10px}
.exp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.exp-name{font-size:14px;font-weight:500}
.exp-meta{font-size:11px;color:var(--sub);margin-top:1px}
.exp-right{text-align:right}
.exp-amt{font-size:15px;font-weight:600}
.exp-payer{font-size:11px;color:var(--sub);margin-top:1px}
.add-exp-btn{width:100%;padding:14px;background:var(--c);color:#fff;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}
.empty{text-align:center;color:#c0c0c5;padding:36px 0;font-size:13px;line-height:2}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(50,50,50,.92);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#f2f2f7;border-radius:20px 20px 0 0;padding:20px 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:#c0c0c5;border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;color:#1c1c1e;text-align:center}
.frow{margin-bottom:12px}
.frow label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;padding:11px 13px;border:none;border-radius:10px;font-size:15px;background:#fff;color:#1c1c1e;font-family:inherit;-webkit-appearance:none;outline:none}
.frow textarea{resize:none;height:72px}
.hint-text{font-size:11px;color:var(--sub);margin-top:4px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:14px;border:none;background:#e5e5ea;border-radius:12px;font-size:15px;cursor:pointer;color:#1c1c1e;font-family:inherit;font-weight:500}
.btn-save{flex:1;padding:14px;border:none;background:var(--c);color:#fff;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.btn-save:disabled{opacity:.4}
.btn-danger{padding:14px;border:none;background:#fff0ee;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;width:100%;margin-top:8px;color:var(--red);font-family:inherit}
.full-btn{width:100%;padding:14px;border:none;background:var(--c);color:#fff;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit;margin-bottom:8px}

/* MEMBER CHECKBOXES */
.member-check-row{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.member-check{display:flex;align-items:center;gap:7px;background:#fff;border-radius:20px;padding:7px 13px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.member-check.selected{border-color:var(--c);background:var(--ca)}
.mc-av{width:24px;height:24px;border-radius:50%;background:#f2f2f7;font-size:14px;display:flex;align-items:center;justify-content:center}
.mc-name{font-size:13px;font-weight:500}
.select-all-btn{font-size:12px;color:var(--c);background:none;border:none;cursor:pointer;padding:4px 8px;font-family:inherit;text-decoration:underline}

/* BALLOON */
.balloon-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
.balloon-overlay.open{display:flex}
.balloon{background:#fff;border-radius:20px;padding:20px;box-shadow:0 12px 48px rgba(0,0,0,.18);width:300px;max-width:88vw}
.balloon-name{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center}
.balloon-avatars{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.b-avatar-btn{width:44px;height:44px;border-radius:50%;border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;background:#f2f2f7}
.b-avatar-btn.selected{border-color:var(--c);background:var(--ca)}
.balloon-btns{display:flex;gap:8px}
.balloon-cancel{flex:1;padding:11px;background:#e5e5ea;color:#1c1c1e;border:none;border-radius:11px;font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
.balloon-save{flex:1;padding:11px;background:var(--c);color:#fff;border:none;border-radius:11px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}

/* SETTLE */
.settle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:.5px solid #f2f2f7}
.settle-row:last-child{border-bottom:none}
.settle-name{font-size:15px;font-weight:600}
.settle-detail{font-size:12px;color:var(--sub);margin-top:2px}
.settle-amount{font-size:15px;font-weight:700}
.settle-amount.owe{color:var(--red)}
.settle-amount.receive{color:var(--green)}
.settle-amount.even{color:var(--sub)}
.debt-row{padding:8px 0;border-bottom:.5px solid #f9f9f9;font-size:13px;display:flex;justify-content:space-between}

/* SPLIT */
.split-member-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #f2f2f7}
.split-member-row:last-child{border-bottom:none}
.split-name{font-size:14px;font-weight:500}
.split-input{width:110px;padding:7px 10px;border:none;border-radius:8px;font-size:14px;background:#f2f2f7;color:#1c1c1e;font-family:inherit;text-align:right;outline:none}
.split-total-note{font-size:12px;color:var(--sub);text-align:right;margin-top:6px}
.split-total-note.error{color:var(--red)}
.day-picker-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.day-picker-row::-webkit-scrollbar{display:none}
.day-pick-btn{padding:7px 13px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0;font-family:inherit}
.day-pick-btn.active{background:var(--c);color:#fff;border-color:var(--c)}
.screen{position:fixed;inset:0;background:#f2f2f7;z-index:400;display:none;flex-direction:column;max-width:430px;margin:0 auto}
.screen.open{display:flex}
.screen-header{background:var(--c);color:#fff;padding:56px 16px 12px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0}
.screen-header h2{font-size:17px;font-weight:600}
.screen-close{background:none;border:none;color:rgba(255,255,255,.85);font-size:15px;cursor:pointer;padding:4px 0 4px 16px;font-family:inherit}
.screen-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.screen-footer{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:#fff;border-top:.5px solid var(--border)}
.trip-item{background:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.trip-item.active-trip{background:#e8f4fd}
.ti-name{font-size:15px;font-weight:600}

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp}
from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fb=initializeApp({apiKey:"AIzaSyDnY5wcb0QXOPXzAvRmrqltESS_U5afCS8",authDomain:"travel-app-38ad8.firebaseapp.com",projectId:"travel-app-38ad8",storageBucket:"travel-app-38ad8.firebasestorage.app",messagingSenderId:"306708070000",appId:"1:306708070000:web:716f2db183d2e432357eb5"});
const db=getFirestore(fb);

const TAG_CLASS={景點:'tag-spot',餐廳:'tag-food',購物:'tag-shop',交通:'tag-move',住宿:'tag-stay'};
const CAT_COLORS={餐飲:'#fff3e0',交通:'#e8f5e9',景點門票:'#e8f4fd',購物:'#fce4ec',住宿:'#ede7f6',其他:'#f5f5f5'};
const CAT_ICON_COLOR={餐飲:'#e65100',交通:'#2e7d32',景點門票:'#1565c0',購物:'#880e4f',住宿:'#4527a0',其他:'#555'};
const AVATARS=['🧑','👩','🧒','👦','👧','🐱','🐶','🐻','🦊','🐼','🐨','🐯','🦁','🐸','🐙','⭐','🌸','🍀'];
const COL_W=300;

function parseList(s){return s.split(/[,，]/).map(x=>x.trim()).filter(Boolean);}
function getCurTrip(){return trips.find(x=>x.id===curTripId)||null;}
function getMembers(){return getCurTrip()?.members||[];}
function getCities(){return getCurTrip()?.cities||[];}
function getSymbol(){const t=getCurTrip();return t?(t.currency||'¥').split(' ')[0]:'¥';}
function fmt(n){return getSymbol()+Number(n||0).toLocaleString();}

let trips=[],curTripId=null,curDay=0,curBudgetDay='all',curCat='景點',curCatFilter=null;
let spots=[],expenses=[],days=[];
let editSpotId=null,editExpId=null,editTripId=null,aimPlace=null,aimDayIdx=0;
let balloonMember=null,balloonSelectedAvatar=null,memberAvatars={};
let saving=false;

function withLock(btn,fn){
  if(saving)return;saving=true;
  const orig=btn?.textContent;
  if(btn)btn.disabled=true;
  Promise.resolve(fn()).finally(()=>{saving=false;if(btn){btn.disabled=false;if(orig)btn.textContent=orig;}});
}
function setSyncDot(s){document.getElementById('sync-dot').className='sync-dot'+(s==='on'?' on':s==='syncing'?' syncing':' off');}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

// modals
function setupModal(oid,cid){
  const o=document.getElementById(oid),c=cid?document.getElementById(cid):null;
  if(c)c.addEventListener('click',()=>o.classList.remove('open'));
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
}
[['trip-modal','trip-cancel-btn'],['spot-modal','spot-cancel-btn'],['add-day-modal','addday-cancel-btn'],
 ['exp-modal','exp-cancel-btn'],['add-itin-modal','aim-cancel-btn'],['settle-modal','settle-cancel-btn'],
 ['edit-day-modal','edit-day-cancel-btn']].forEach(([o,c])=>setupModal(o,c));
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
window.closeModal=closeModal;

window.showPage=function(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');btn.classList.add('active');
};

// ── SCROLLBAR ──
const hscroll=document.getElementById('itin-hscroll');
hscroll.addEventListener('scroll',()=>{
  const max=hscroll.scrollWidth-hscroll.clientWidth;
  const pct=max>0?hscroll.scrollLeft/max:0;
  document.getElementById('scroll-thumb').style.width=(pct*100)+'%';
  // edge swipe to change day
  if(hscroll.scrollLeft<=0&&_swipeEdge==='left'){nextDay(-1);_swipeEdge=null;}
  if(hscroll.scrollLeft>=max&&_swipeEdge==='right'){nextDay(1);_swipeEdge=null;}
},{passive:true});
let _swipeEdge=null,_touchStartX=0;
hscroll.addEventListener('touchstart',e=>{_touchStartX=e.touches[0].clientX;},{passive:true});
hscroll.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_touchStartX;
  const max=hscroll.scrollWidth-hscroll.clientWidth;
  if(dx>40&&hscroll.scrollLeft<=0)_swipeEdge='left';
  else if(dx<-40&&hscroll.scrollLeft>=max-2)_swipeEdge='right';
},{passive:true});
function nextDay(dir){
  const next=curDay+dir;
  if(next>=0&&next<days.length){curDay=next;renderDayTabs();renderItinerary();hscroll.scrollLeft=0;}
}

// ── TRIPS ──
onSnapshot(query(collection(db,'trips'),orderBy('ts')),snap=>{
  trips=[];snap.forEach(d=>trips.push({...d.data(),id:d.id}));
  setSyncDot('on');renderTripList();
  if(!curTripId&&trips.length>0)selectTrip(trips[0].id);
  else if(curTripId)renderHome();
},()=>setSyncDot('off'));

function renderTripList(){
  document.getElementById('trip-list-body').innerHTML=trips.length?trips.map(t=>`
    <div class="trip-item${t.id===curTripId?' active-trip':''}" onclick="selectTrip('${t.id}')">
      <div><div class="ti-name">${t.name}</div><div class="ti-meta">${t.startDate||''}${t.endDate?' → '+t.endDate:''} · ${(t.members||[]).join('、')}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        ${t.id===curTripId?'<span class="ti-badge">使用中</span>':''}
        <button class="icon-btn" onclick="event.stopPropagation();openEditTrip('${t.id}')">✏️</button>
        <button class="icon-btn" onclick="event.stopPropagation();deleteTrip('${t.id}')">🗑</button>
      </div>
    </div>`).join(''):'<div class="empty">尚無旅行<br>點下方新增</div>';
}

window.selectTrip=function(id){
  curTripId=id;curDay=0;curCatFilter=null;
  try{memberAvatars=JSON.parse(localStorage.getItem('avatars_'+id)||'{}');}catch(e){memberAvatars={};}
  const t=trips.find(x=>x.id===id);
  if(t){document.getElementById('ts-name').textContent=t.name;document.getElementById('ts-date').textContent=(t.startDate||'')+(t.endDate?' → '+t.endDate:'');document.getElementById('header-sub').textContent=t.subtitle||t.name;}
  closeTripList();subscribeTrip();renderHome();
};
window.openTripList=function(){document.getElementById('trip-list-screen').classList.add('open');};
window.closeTripList=function(){document.getElementById('trip-list-screen').classList.remove('open');};

function subscribeTrip(){
  if(window._spotsUnsub)window._spotsUnsub();
  if(window._expUnsub)window._expUnsub();
  if(window._daysUnsub)window._daysUnsub();
  if(!curTripId)return;
  window._daysUnsub=onSnapshot(query(collection(db,'trips',curTripId,'days'),orderBy('order')),snap=>{
    days=[];snap.forEach(d=>days.push({...d.data(),id:d.id}));
    renderDayTabs();renderItinerary();renderBudgetFilter();renderHome();
  });
  window._spotsUnsub=onSnapshot(query(collection(db,'trips',curTripId,'spots'),orderBy('ts')),snap=>{
    spots=[];snap.forEach(d=>spots.push({...d.data(),id:d.id}));
    renderItinerary();renderHome();
  });
  window._expUnsub=onSnapshot(query(collection(db,'trips',curTripId,'expenses'),orderBy('ts')),snap=>{
    expenses=[];snap.forEach(d=>expenses.push({...d.data(),id:d.id}));
    renderExpenses();
  });
}

// ── AUTO DAYS ──
async function autoGenerateDays(tripId,startDate,endDate,cities){
  if(!startDate||!endDate)return;
  const s=new Date(startDate),e=new Date(endDate);
  const total=Math.round((e-s)/86400000)+1;
  if(total<=0||total>60)return;
  const existing=await new Promise(res=>{const u=onSnapshot(collection(db,'trips',tripId,'days'),snap=>{u();res(snap.size);});});
  if(existing>0)return;
  for(let i=0;i<total;i++){
    const d=new Date(s);d.setDate(s.getDate()+i);
    const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
    await addDoc(collection(db,'trips',tripId,'days'),{city:cities[i]||cities[cities.length-1]||'',stay:'',order:i,date:dateStr,ts:serverTimestamp()});
  }
}

// ── HOME ──
function renderHome(){
  const t=getCurTrip();
  if(!t){document.getElementById('home-content').innerHTML='<div class="empty">請選擇行程</div>';return;}
  const start=t.startDate?new Date(t.startDate):null;
  const end=t.endDate?new Date(t.endDate):null;
  const diffDays=start&&end?Math.round((end-start)/86400000)+1:0;
  const today=new Date();today.setHours(0,0,0,0);
  const dl=start?Math.ceil((start-today)/86400000):null;
  let todayDayIdx=-1;
  if(dl!==null&&dl<=0)todayDayIdx=Math.min(Math.abs(dl),days.length-1);
  const cdText=dl===null?'—':dl>0?dl:dl===0?'今天出發':'旅行中';
  const cdLabel=dl>0?'距出發天數':dl<0?'旅行中':'';
  const members=getMembers(),cities=getCities();

  let todayHTML='';
  if(todayDayIdx>=0&&days.length>0){
    const d=days[todayDayIdx];
    const todaySpots=spots.filter(s=>s.day===todayDayIdx).sort((a,b)=>a.t.localeCompare(b.t));
    todayHTML=`<div class="today-card">
      <div class="today-header" onclick="goToItinerary(${todayDayIdx})">
        <span class="th-label">第${todayDayIdx+1}天${d?.city?' · '+d.city:''}</span>
        <span class="th-go">完整行程 →</span>
      </div>
      ${todaySpots.length?todaySpots.slice(0,5).map(s=>{
        const avs=(s.members||[]).map(m=>`<div class="tr-av">${memberAvatars[m]||m.charAt(0)}</div>`).join('');
        return `<div class="today-row"><span class="tr-time">${s.t}</span><span class="tr-dot"></span><span class="tr-name">${s.n}</span><div class="tr-members">${avs}</div></div>`;
      }).join(''):'<div style="padding:14px 16px;font-size:13px;color:#c0c0c5;text-align:center">今天尚無行程</div>'}
    </div>`;
  }
  document.getElementById('home-content').innerHTML=`
    <div class="trip-card"><h2>${t.name}</h2>
      <div class="dates">${t.startDate||''}${t.endDate?' ─ '+t.endDate:''}</div>
      <div class="trip-stats">
        <div class="stat"><div class="num">${diffDays||'?'}</div><div class="lbl">天數</div></div>
        <div class="stat"><div class="num">${members.length||'?'}</div><div class="lbl">成員</div></div>
        <div class="stat"><div class="num">${cities.length||'?'}</div><div class="lbl">城市</div></div>
      </div>
    </div>
    <div class="countdown"><div class="days">${cdText}</div><div class="lbl">${cdLabel}</div></div>
    ${todayHTML}
    ${members.length?`<div class="sec-label">旅遊成員 <span class="sec-edit" onclick="openEditTrip('${t.id}')">編輯</span></div>
    <div class="members-row">${members.map((m,i)=>{const av=memberAvatars[m]||'';const cols=['#e8f4fd','#fef3f0','#e8f5e9','#fff8f0','#f0ebff','#fdf5ff'];
      return `<div class="member-chip" style="background:${cols[i%cols.length]}" onclick="openBalloon(event,'${m}')"><div class="m-avatar">${av||m.charAt(0)}</div>${m}</div>`;}).join('')}</div>`:''}
    ${cities.length?`<div class="sec-label">旅遊地區 <span class="sec-edit" onclick="openEditTrip('${t.id}')">編輯</span></div>
    <div class="chip-row">${cities.map(c=>`<div class="chip">${c}</div>`).join('')}</div>`:''}
    <div class="currency-badge">記帳貨幣：${t.currency||'¥ 日圓'}</div>
    <button class="add-btn" onclick="openEditTrip('${t.id}')">編輯旅行資料</button>`;
}
window.goToItinerary=function(i){
  curDay=i;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-itinerary').classList.add('active');
  document.querySelectorAll('.nav-btn')[1].classList.add('active');

};

window.saveTrip=function(){
  withLock(document.getElementById('trip-save-btn'),async()=>{
    const name=document.getElementById('tm-name').value.trim();if(!name)return;
    const cities=parseList(document.getElementById('tm-cities').value);
    const members=parseList(document.getElementById('tm-members').value);
    const startDate=document.getElementById('tm-start').value;
    const endDate=document.getElementById('tm-end').value;
    const data={name,subtitle:document.getElementById('tm-sub').value.trim(),startDate,endDate,members,cities,currency:document.getElementById('tm-currency').value,ts:serverTimestamp()};
    setSyncDot('syncing');
    if(editTripId){
      await updateDoc(doc(db,'trips',editTripId),data);
      if(startDate&&endDate){
        const newStart=new Date(startDate),newEnd=new Date(endDate);
        const newTotal=Math.round((newEnd-newStart)/86400000)+1;
        for(let i=0;i<newTotal;i++){
          const d=new Date(newStart);d.setDate(newStart.getDate()+i);
          const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
          const newCity=cities[i]||cities[cities.length-1]||'';
          if(i<days.length)await updateDoc(doc(db,'trips',editTripId,'days',days[i].id),{date:dateStr,city:newCity,order:i});
          else await addDoc(collection(db,'trips',editTripId,'days'),{city:newCity,stay:'',order:i,date:dateStr,ts:serverTimestamp()});
        }
        for(let i=newTotal;i<days.length;i++){
          for(const s of spots.filter(s=>s.day===i))await deleteDoc(doc(db,'trips',editTripId,'spots',s.id));
          await deleteDoc(doc(db,'trips',editTripId,'days',days[i].id));
        }
      }
    }else{
      const ref=await addDoc(collection(db,'trips'),data);
      await autoGenerateDays(ref.id,startDate,endDate,cities);
      if(!curTripId)selectTrip(ref.id);
    }
    closeModal('trip-modal');toast('旅行資料已儲存');setSyncDot('on');
  });
};

// ── MULTI-COLUMN ITINERARY ──
function assignColumns(partial){
  const cols=[];// cols[i] = Set of member names
  const spotCols=new Map();// spot.id -> colIndex

  partial.forEach(s=>{
    const mSet=new Set(s.members||[]);
    if(!mSet.size){
      if(!cols.length)cols.push(new Set());
      spotCols.set(s.id,0);return;
    }
    // find best col: most overlap, no conflict with other cols
    let bestCol=-1,bestOverlap=-1;
    cols.forEach((colM,ci)=>{
      const overlap=[...mSet].filter(m=>colM.has(m)).length;
      // check no member of this spot is already in a different col
      const conflict=[...mSet].some(m=>cols.some((c,i)=>i!==ci&&c.has(m)));
      if(!conflict&&overlap>bestOverlap){bestOverlap=overlap;bestCol=ci;}
    });
    if(bestCol>=0){
      [...mSet].forEach(m=>cols[bestCol].add(m));
      spotCols.set(s.id,bestCol);
    }else{
      bestCol=cols.length;
      cols.push(new Set(mSet));
      spotCols.set(s.id,bestCol);
    }
  });
  return{cols,spotCols};
}

function makeCardHTML(s){
  const avs=(s.members||[]).map(m=>`<div class="card-av">${memberAvatars[m]||m.charAt(0)}</div>`).join('');
  return `<div class="itin-card${s.fullRow?' full-row-card':''}">
    <div class="card-actions">
      <button class="card-btn" onclick="openEditSpot('${s.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="card-btn" onclick="delSpot('${s.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <h4>${s.n}</h4>
    <div class="card-meta"><span class="card-tag ${TAG_CLASS[s.type]||'tag-spot'}">${s.type}</span>${s.note?`<span>${s.note}</span>`:''}</div>
    <div class="card-members">${avs}</div>
  </div>`;
}

function renderItinerary(){
  renderDayInfoBar();
  const grid=document.getElementById('itin-grid');
  if(!days.length){
    grid.innerHTML='<div style="padding:24px;color:#c0c0c5;font-size:13px;text-align:center">尚未建立行程天數<br>點「新增一天」開始</div>';
    return;
  }

  const daySpots=spots.filter(s=>s.day===curDay).sort((a,b)=>a.t.localeCompare(b.t));
  const fullRowSpots=daySpots.filter(s=>s.fullRow);
  const partialSpots=daySpots.filter(s=>!s.fullRow);

  const{cols,spotCols}=assignColumns(partialSpots);
  const numCols=Math.max(cols.length,1);
  const CARD_H=98;// px per time slot
  const GAP=8;

  // all unique times across ALL spots (partial + fullRow)
  const allTimes=[...new Set(daySpots.map(s=>s.t))].sort();

  // time axis
  let timeHTML='';
  allTimes.forEach(t=>{timeHTML+=`<div class="time-slot" style="height:${CARD_H}px"><span>${t}</span></div>`;});
  timeHTML+=`<div style="height:60px"></div>`;

  // build each column
  const colsArr=[];
  for(let ci=0;ci<numCols;ci++){
    const colMembers=cols[ci]?[...cols[ci]]:[];
    const colAvatars=colMembers.map(m=>`<div class="col-av">${memberAvatars[m]||m.charAt(0)}</div>`).join('');
    let html=`<div class="col-header"><div class="col-header-members">${colAvatars||'<span class="col-label">行程</span>'}</div></div>`;
    allTimes.forEach(t=>{
      const atTime=partialSpots.filter(s=>s.t===t&&spotCols.get(s.id)===ci);
      // also show full-row spots here only in first col as spanning card
      if(ci===0){
        const frAtTime=fullRowSpots.filter(s=>s.t===t);
        frAtTime.forEach(s=>{
          html+=`<div style="height:${CARD_H}px;padding:0 0 ${GAP}px;display:flex;align-items:stretch;width:${COL_W*numCols+GAP*(numCols-1)}px">
            <div style="flex:1;background:#e8f4fd;border-radius:11px;border:.5px solid #b5d4f4;padding:10px 12px;position:relative;overflow:hidden">
              <div class="card-actions">
                <button class="card-btn" onclick="openEditSpot('${s.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button class="card-btn" onclick="delSpot('${s.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
              </div>
              <h4 style="color:var(--cb);padding-right:54px">${s.n}</h4>
              <div class="card-meta"><span class="card-tag ${TAG_CLASS[s.type]||'tag-spot'}">${s.type}</span><span style="color:var(--cb);font-size:10px">全員</span>${s.note?`<span>${s.note}</span>`:''}</div>
              <div class="card-members">${getMembers().map(m=>`<div class="card-av">${memberAvatars[m]||m.charAt(0)}</div>`).join('')}</div>
            </div>
          </div>`;
        });
      }
      if(atTime.length){
        atTime.forEach(s=>{
          html+=`<div style="height:${CARD_H}px;padding:0 0 ${GAP}px;display:flex;align-items:stretch">${makeCardHTML(s)}</div>`;
        });
      }else if(!fullRowSpots.some(s=>s.t===t)){
        // empty placeholder only if no full-row at this time
        html+=`<div style="height:${CARD_H}px;padding:0 0 ${GAP}px"></div>`;
      }else if(ci>0){
        // other cols need placeholder when full-row is in col 0
        html+=`<div style="height:${CARD_H}px;padding:0 0 ${GAP}px"></div>`;
      }
    });
    colsArr.push(`<div style="width:${COL_W}px;flex-shrink:0">${html}</div>`);
  }

  const totalW=numCols*COL_W+(numCols-1)*GAP;
  grid.innerHTML=`
    <div class="time-axis" style="width:${44}px">${timeHTML}</div>
    <div style="display:flex;gap:${GAP}px;padding:8px 8px 8px 0;align-items:flex-start;min-width:${totalW}px">
      ${colsArr.join('')}
    </div>`;
}
}

  document.getElementById('preset-list').innerHTML=
    `<div style="font-size:12px;color:var(--sub);font-weight:500;margin-bottom:10px">精選推薦・${curCat}</div>`+
    (presets[curCat]||[]).map(p=>`
      <div class="place-card">
        <div class="place-thumb">${curCat==='景點'?'🏛':curCat==='餐廳'?'🍜':'🛍'}</div>
        <div class="place-info"><h4>${p.name}</h4><div class="addr">${p.city}</div><div class="pdesc">${p.desc}</div>
          <div class="pfoot"><span style="display:flex;gap:6px"><span class="rating">★ ${p.rating}</span><span style="font-size:11px;color:var(--sub)">${p.tip}</span></span>
          <button class="add-to-btn" onclick="openAddToItin(${JSON.stringify(p).replace(/"/g,'&quot;')})">＋ 加入</button></div>
        </div>
      </div>`).join('');
}
window.openGoogleMaps=function(){const t=getCurTrip();window.open(`https://maps.google.com/maps?q=${encodeURIComponent((t?.cities||[]).join(' ')||'日本')}&hl=zh-TW`,'_blank');};
window.openAddToItin=function(p){
  if(!curTripId){toast('請先選擇行程');return;}if(!days.length){toast('請先新增天數');return;}
  aimPlace=p;aimDayIdx=curDay<days.length?curDay:0;
  document.getElementById('aim-name').textContent=p.name;
  document.getElementById('aim-city').textContent=p.city;
  document.getElementById('aim-note').value='';document.getElementById('aim-time').value='10:00';
  document.getElementById('aim-day-picker').innerHTML=days.map((d,i)=>
    `<button class="day-pick-btn${i===aimDayIdx?' active':''}" onclick="setAimDay(${i})">第${i+1}天${d.city?' '+d.city:''}</button>`).join('');
  openModal('add-itin-modal');
};
window.setAimDay=function(i){aimDayIdx=i;document.querySelectorAll('.day-pick-btn').forEach((b,idx)=>b.classList.toggle('active',idx===i));};
window.saveAddToItin=function(){
  withLock(document.getElementById('aim-save-btn'),async()=>{
    if(!aimPlace||!curTripId)return;
    await addDoc(collection(db,'trips',curTripId,'spots'),{n:aimPlace.name,t:document.getElementById('aim-time').value,type:curCat,note:document.getElementById('aim-note').value,trans:'',members:[],fullRow:false,day:aimDayIdx,ts:serverTimestamp()});
    closeModal('add-itin-modal');toast(`已加入第${aimDayIdx+1}天`);
  });
};

// ── BUDGET ──
const CAT_COLORS_BTN={餐飲:'#e65100',交通:'#2e7d32',景點門票:'#1565c0',購物:'#880e4f',住宿:'#4527a0',其他:'#555'};
function catSVG(cat){
  const c=CAT_ICON_COLOR[cat]||'#555';
  const p={餐飲:`<path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>`,交通:`<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>`,景點門票:`<path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"/>`,購物:`<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>`,住宿:`<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>`,其他:`<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`};
  return `<svg width="18" height="18" viewBox="0 0 24 24" stroke="${c}" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p[cat]||p['其他']}</svg>`;
}
function renderCatFilters(){
  const cats=[...new Set(expenses.map(e=>e.cat))];
  document.getElementById('cat-filter-row').innerHTML=cats.map(c=>`
    <button class="cat-filter-btn${curCatFilter===c?' active':''}" style="${curCatFilter===c?`background:${CAT_COLORS_BTN[c]||'#555'}`:''}" onclick="toggleCatFilter('${c}')">${c}</button>`).join('');
}
window.toggleCatFilter=function(cat){curCatFilter=curCatFilter===cat?null:cat;renderCatFilters();renderExpenses();};
function renderBudgetFilter(){
  const t=getCurTrip();
  const cur=t?.currency||'¥ 日圓';
  const badge=document.getElementById('currency-badge');
  badge.textContent='記帳貨幣：'+cur;badge.style.display='inline-flex';
  document.getElementById('e-currency-label').textContent=getSymbol();
  const tabs=[{v:'all',l:'全部'},...days.map((d,i)=>({v:i,l:`第${i+1}天 ${d.city||''}`}))];
  document.getElementById('budget-filter').innerHTML=tabs.map(t=>
    `<button class="day-filter-btn${t.v===curBudgetDay?' active':''}" onclick="setBDay('${t.v}')">${t.l}</button>`).join('');
  document.getElementById('e-day').innerHTML=days.map((d,i)=>
    `<option value="${i}">第${i+1}天${d.city?' ('+d.city+')':''}</option>`).join('');
}
window.setBDay=function(v){curBudgetDay=v==='all'?'all':parseInt(v);renderBudgetFilter();renderExpenses();};
function getFilteredExp(){let l=curBudgetDay==='all'?expenses:expenses.filter(e=>e.day===curBudgetDay);if(curCatFilter)l=l.filter(e=>e.cat===curCatFilter);return l;}
function renderExpenses(){
  renderCatFilters();
  const list=getFilteredExp();
  const total=list.reduce((s,e)=>s+e.amt,0);
  document.getElementById('budget-total').textContent=fmt(total);
  document.getElementById('exp-list').innerHTML=list.length?list.map(e=>{
    const paidBy=e.splits?Object.entries(e.splits).filter(([,v])=>v>0).map(([k,v])=>`${k} ${fmt(v)}`).join('、'):'';
    return `<div class="exp-item" onclick="openExpModal('${e.id}')">
      <div class="exp-left"><div class="exp-icon" style="background:${CAT_COLORS[e.cat]||'#f5f5f5'}">${catSVG(e.cat)}</div>
        <div><div class="exp-name">${e.name}</div><div class="exp-meta">${e.cat} · 第${(e.day||0)+1}天${days[e.day]?' '+days[e.day].city:''}</div></div>
      </div>
      <div class="exp-right"><div class="exp-amt">${fmt(e.amt)}</div>${paidBy?`<div class="exp-payer">${paidBy}</div>`:''}</div>
    </div>`;}).join(''):'<div class="empty">尚無消費記錄</div>';
}
window.updateSplitFromTotal=function(){
  const total=parseFloat(document.getElementById('e-amt').value)||0;
  const members=getMembers();if(!members.length)return;
  const each=Math.round(total/members.length);
  members.forEach(m=>{const inp=document.getElementById('split-'+m);if(inp&&!inp.dataset.manual)inp.value=each||'';});
  updateSplitNote();
};
window.updateSplitNote=function(){
  const total=parseFloat(document.getElementById('e-amt').value)||0;
  const splitTotal=getMembers().reduce((s,m)=>{return s+(parseFloat(document.getElementById('split-'+m)?.value||0));},0);
  const note=document.getElementById('split-note');
  const diff=total-splitTotal;
  note.textContent=diff===0||total===0?'':`尚有 ${getSymbol()}${Math.abs(diff).toLocaleString()} ${diff>0?'未分配':'超出'}`;
  note.className='split-total-note'+(diff!==0&&total!==0?' error':'');
};
function renderSplitRows(existing={}){
  const members=getMembers();
  const total=parseFloat(document.getElementById('e-amt').value)||0;
  const each=members.length?Math.round(total/members.length):0;
  document.getElementById('split-rows').innerHTML=members.map(m=>`
    <div class="split-member-row"><span class="split-name">${m}</span>
    <input class="split-input" id="split-${m}" type="number" placeholder="0" value="${existing[m]!==undefined?existing[m]:each||''}" oninput="this.dataset.manual=1;updateSplitNote()"></div>`).join('');
  updateSplitNote();
}
window.openExpModal=function(id){
  editExpId=id||null;const isEdit=!!id;
  document.getElementById('exp-modal-title').textContent=isEdit?'編輯消費':'新增消費';
  document.getElementById('exp-delete-btn').style.display=isEdit?'block':'none';
  renderBudgetFilter();
  const e=isEdit?expenses.find(x=>x.id===id):null;
  document.getElementById('e-name').value=e?.name||'';
  document.getElementById('e-amt').value=e?.amt||'';
  document.getElementById('e-cat').value=e?.cat||'餐飲';
  document.getElementById('e-day').value=e?.day||0;
  renderSplitRows(e?.splits||{});
  openModal('exp-modal');
};
window.saveExp=function(){
  withLock(document.getElementById('exp-save-btn'),async()=>{
    const name=document.getElementById('e-name').value.trim();
    const amt=parseInt(document.getElementById('e-amt').value)||0;
    if(!name||!amt||!curTripId)return;
    const splits={};getMembers().forEach(m=>{const v=parseFloat(document.getElementById('split-'+m)?.value||0);if(v)splits[m]=v;});
    const data={name,amt,cat:document.getElementById('e-cat').value,splits,day:parseInt(document.getElementById('e-day').value),ts:serverTimestamp()};
    setSyncDot('syncing');
    if(editExpId)await updateDoc(doc(db,'trips',curTripId,'expenses',editExpId),data);
    else await addDoc(collection(db,'trips',curTripId,'expenses'),data);
    closeModal('exp-modal');toast(editExpId?'消費已更新':'消費已記錄');setSyncDot('on');
  });
};
window.deleteExpFromModal=async function(){
  if(!editExpId||!confirm('確定刪除？'))return;
  await deleteDoc(doc(db,'trips',curTripId,'expenses',editExpId));closeModal('exp-modal');toast('已刪除');
};

// ── SETTLE ──
window.openSettle=function(){
  const members=getMembers();if(!members.length){toast('尚無成員資料');return;}
  const paid={},owed={};members.forEach(m=>{paid[m]=0;owed[m]=0;});
  expenses.forEach(e=>{
    if(e.splits)Object.entries(e.splits).forEach(([m,v])=>{if(paid[m]!==undefined)paid[m]+=v;});
    const share=e.amt/members.length;members.forEach(m=>{owed[m]+=share;});
  });
  const net={};members.forEach(m=>{net[m]=Math.round((paid[m]||0)-(owed[m]||0));});
  const debtors=members.filter(m=>net[m]<0).map(m=>({name:m,amt:-net[m]}));
  const creditors=members.filter(m=>net[m]>0).map(m=>({name:m,amt:net[m]}));
  const transfers=[];let di=0,ci=0;
  while(di<debtors.length&&ci<creditors.length){
    const d=debtors[di],c=creditors[ci],amt=Math.min(d.amt,c.amt);
    transfers.push({from:d.name,to:c.name,amt});d.amt-=amt;c.amt-=amt;
    if(d.amt===0)di++;if(c.amt===0)ci++;
  }
  document.getElementById('settle-content').innerHTML=`
    <div style="margin-bottom:14px">${members.map(m=>`
      <div class="settle-row">
        <div><div class="settle-name">${memberAvatars[m]||m.charAt(0)} ${m}</div>
        <div class="settle-detail">付了 ${fmt(paid[m]||0)} · 應付 ${fmt(Math.round(owed[m]||0))}</div></div>
        <div class="settle-amount ${net[m]>0?'receive':net[m]<0?'owe':'even'}">${net[m]>0?'待收 '+fmt(net[m]):net[m]<0?'待付 '+fmt(-net[m]):'已結清'}</div>
      </div>`).join('')}</div>
    ${transfers.length?`<div style="font-size:12px;font-weight:600;color:var(--sub);margin-bottom:8px">建議轉帳</div>${transfers.map(t=>`<div class="debt-row"><span>${t.from} → ${t.to}</span><span style="color:var(--red);font-weight:600">${fmt(t.amt)}</span></div>`).join('')}`:''}`;
  openModal('settle-modal');
};

// ── INIT ──
renderPresets();
</script>
